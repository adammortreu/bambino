function printAbs(){const tab=state.absTab;const nameOf=(kind,id)=>{const o=kind==="emp"?state.emps.find(x=>x.id===id):state.kids.find(x=>x.id===id);return o?o.f+" "+o.l:"?";};const list=state.abs.filter(a=>a.kind===tab&&(state.absMotifFilt==="Tous"||a.motif===state.absMotifFilt)).sort((a,b)=>(b.from||"").localeCompare(a.from||""));const byP={};list.forEach(a=>{const n=nameOf(a.kind,a.ref);byP[n]=(byP[n]||0)+durDays(a);});let html=`<div class="card" style="margin-bottom:8px"><h1>Absences — ${tab==="emp"?"Salariés":"Enfants"}</h1><div class="sub">${state.absMotifFilt==="Tous"?"Tous motifs":"Motif : "+state.absMotifFilt}</div></div><div class="card">`+(list.length?list.map(a=>`<div style="padding:8px 0;border-top:1px solid #f3eee2"><b>${nameOf(a.kind,a.ref)}</b> — ${E(a.motif)} · ${a.from} → ${a.to||a.from} (${durDays(a)} j)</div>`).join(""):`<div class="mini">Aucune absence.</div>`)+`</div><div class="card" style="margin-top:8px"><b>Total jours par ${tab==="emp"?"salarié":"enfant"}</b>`+Object.entries(byP).map(([k,v])=>`<div style="padding:5px 0">${k} : <b>${v} j</b></div>`).join("")+`</div>`;document.getElementById("modal").innerHTML="";document.getElementById("app").innerHTML=html;setTimeout(function(){window.print();render();},200);}
function kidSlot(k,d){if(state.abs.some(a=>a.kind==="child"&&a.ref===k.id&&d>=a.d0&&d<=a.d1))return"";return k.plan[d]||"";}
function segs(str){return str?str.split(";").filter(Boolean).map(x=>{const p=x.split("|");const t=p[0].split("-");return{s:t[0],en:t[1],name:p[1]||"",color:p[2]||""};}):[];}
function encSeg(sg){let s=sg.s+"-"+sg.en;if(sg.name||sg.color)s+="|"+(sg.name||"")+(sg.color?"|"+sg.color:"");return s;}
function joinSegs(arr){return arr.map(encSeg).join(";");}
function kidSegs(k,d){return segs(kidSlot(k,d));}
function reqPros(nm,march){const tot=nm+march;if(tot===0)return 0;let r=state.ratio==="58"?Math.ceil(nm/5)+Math.ceil(march/8):Math.ceil(tot/6);if(tot>3)r=Math.max(r,2);return Math.max(1,r);}
function counts(c,d,mode){const a=toMin(CS),b=toMin(CE),out=[];const ks=kidsIn(c),sh=dayShifts(c,d);
  for(let m=a;m<b;m+=30){let nm=0,march=0;ks.forEach(k=>{let pres=false;
    if(mode==="reel"){const p=state.pts[k.id+"_"+d];if(p&&p.arr){const x=toMin(p.arr),y=p.dep?toMin(p.dep):state.now;if(x<=m&&m<y)pres=true;}}
    else pres=kidSegs(k,d).some(sg=>toMin(sg.s)<=m&&m<toMin(sg.en));
    if(pres){if(k.g==="bébé")nm++;else march++;}});
    let pc=0;sh.forEach(s=>{if(toMin(s.s)<=m&&m<toMin(s.en))pc++;});out.push({m,k:nm+march,nm,march,p:pc,req:reqPros(nm,march)});}
  return out;}
function dayStats(c,d){const cr=state.creches.find(x=>x.id===c);let ch=0;kidsIn(c).forEach(k=>kidSegs(k,d).forEach(sg=>ch+=durh(sg.s,sg.en)));
  const open=durh(cr.open,cr.close),occ=open>0?Math.round(100*ch/(cr.cap*open)):0;
  const cnt=counts(c,d,"prev");let peak=0,under=0;cnt.forEach(s=>{if(s.k>peak)peak=s.k;if(s.k>0&&s.p<s.req)under++;});
  return{occ,ch:Math.round(ch),peak,under,pros:new Set(dayShifts(c,d).map(s=>s.e)).size};}

function childCaracs(k){return (k.spec||"").split(",").map(s=>s.trim()).filter(Boolean);}
const pad2=n=>String(n).padStart(2,"0");
function isoD(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function parseD(s){if(!s)return null;const p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function mondayOfDate(d){const x=new Date(d);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
function frDate(d){return ["dim.","lun.","mar.","mer.","jeu.","ven.","sam."][d.getDay()]+" "+pad2(d.getDate())+"/"+pad2(d.getMonth()+1)+"/"+d.getFullYear();}
function ageStr(dob){const b=parseD(dob);if(!b)return "";const n=new Date();let m=(n.getFullYear()-b.getFullYear())*12+(n.getMonth()-b.getMonth());if(n.getDate()<b.getDate())m--;if(m<0)return "";const y=Math.floor(m/12),mo=m%12;return y>0?(y+" an"+(y>1?"s":"")+(mo?" "+mo+" m":"")):(mo+" mois");}
function childHoursOnDate(k,d){const a=parseD(k.arr);if(a&&d<a)return 0;const wd=d.getDay();if(wd<1||wd>5)return 0;let h=0;segs(k.plan[wd-1]).forEach(sg=>h+=durh(sg.s,sg.en));return h;}
function rangeHours(k,from,to){let h=0;for(let d=new Date(from);d<=to;d=addDays(d,1))h+=childHoursOnDate(k,d);return h;}

function statBars(items){const H=150;const max=Math.max(1,...items.map(i=>i.val));return `<div class="scroll"><div style="min-width:${Math.max(280,items.length*46)}px"><div style="display:flex;align-items:flex-end;gap:8px;height:${H}px;border-bottom:2px solid var(--line)">`+items.map(i=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div class="mini" style="margin-bottom:3px">${i.val?i.val.toFixed(1):""}</div><div data-tip="${i.label} : ${i.val.toFixed(1)} h" style="width:100%;max-width:46px;height:${i.val/max*(H-22)}px;background:var(--sage);border-radius:6px 6px 0 0;min-height:${i.val?3:0}px;cursor:pointer"></div></div>`).join("")+`</div><div style="display:flex;gap:8px;margin-top:4px">`+items.map(i=>`<div style="flex:1;text-align:center;font-size:10px;font-weight:bold;color:var(--soft)">${i.label}</div>`).join("")+`</div></div></div>`;}
function statBarsStacked(items){const H=150;const max=Math.max(1,...items.map(i=>i.norm+i.over));return `<div class="scroll"><div style="min-width:${Math.max(280,items.length*46)}px"><div style="display:flex;align-items:flex-end;gap:8px;height:${H}px;border-bottom:2px solid var(--line)">`+items.map(i=>{const tot=i.norm+i.over;return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div class="mini" style="margin-bottom:3px">${tot?tot.toFixed(1):""}</div><div style="width:100%;max-width:46px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer" data-tip="${i.label} : ${i.norm.toFixed(1)} h contrat${i.over?" + "+i.over.toFixed(1)+" h supp.":""}" title="${i.label} : ${i.norm.toFixed(1)} h${i.over?" + "+i.over.toFixed(1)+" h supp.":""}">${i.over?`<div style="height:${i.over/max*(H-22)}px;background:#E0A458;border-radius:6px 6px 0 0;min-height:3px"></div>`:""}<div style="height:${i.norm/max*(H-22)}px;background:var(--sage);border-radius:${i.over?"0":"6px 6px 0 0"};min-height:${i.norm?3:0}px"></div></div></div>`;}).join("")+`</div><div style="display:flex;gap:8px;margin-top:4px">`+items.map(i=>`<div style="flex:1;text-align:center;font-size:10px;font-weight:bold;color:var(--soft)">${i.label}</div>`).join("")+`</div></div><div class="row" style="gap:14px;margin-top:8px;font-size:11px"><span><span style="display:inline-block;width:11px;height:11px;background:var(--sage);border-radius:3px;vertical-align:middle"></span> Heures contrat</span><span><span style="display:inline-block;width:11px;height:11px;background:#E0A458;border-radius:3px;vertical-align:middle"></span> Heures supplémentaires</span></div></div>`;}
function staffWorkedOnDate(eid,d){const wd=d.getDay();if(wd<1||wd>5)return 0;if(state.abs.some(a=>a.kind==="emp"&&a.ref===eid&&dateInAbs(a,d)))return 0;let h=0;state.shifts.filter(s=>s.e===eid&&s.day===wd-1).forEach(s=>h+=durh(s.s,s.en));return h;}
function staffWeekHours(eid,anyDate){const m=mondayOfDate(anyDate);let h=0;for(let i=0;i<5;i++)h+=staffWorkedOnDate(eid,addDays(m,i));return h;}
function periodStacked(worked,contract){const d=parseD(state.statDate)||new Date();const g=state.statGran;const dn=contract>0?contract/5:0;
  const split=(w,norm)=>(!norm||norm<=0)?{norm:w,over:0}:{norm:Math.min(w,norm),over:Math.max(0,w-norm)};
  const monthBuckets=(y,mo)=>{const last=new Date(y,mo+1,0);const b={};for(let x=new Date(y,mo,1);x<=last;x=addDays(x,1)){const mk=isoD(mondayOfDate(x));b[mk]=(b[mk]||0)+worked(x);}return b;};
  if(g==="jour"){const w=worked(d);const s=split(w,dn);return {items:[{label:["dim","lun","mar","mer","jeu","ven","sam"][d.getDay()],norm:s.norm,over:s.over}],norm:s.norm,over:s.over,contract};}
  if(g==="semaine"){const m=mondayOfDate(d);const items=DAYS.map((nm,i)=>{const s=split(worked(addDays(m,i)),dn);return {label:nm.slice(0,3),norm:s.norm,over:s.over};});const norm=items.reduce((a,i)=>a+i.norm,0),over=items.reduce((a,i)=>a+i.over,0);return {items,norm,over,contract};}
  if(g==="mois"){const b=monthBuckets(d.getFullYear(),d.getMonth());const keys=Object.keys(b).sort();const items=keys.map(k=>{const s=split(b[k],contract);return {label:"sem. "+k.slice(8,10),norm:s.norm,over:s.over};});const norm=items.reduce((a,i)=>a+i.norm,0),over=items.reduce((a,i)=>a+i.over,0);return {items,norm,over,contract};}
  const y=d.getFullYear();const MN=["Janv","Févr","Mars","Avr","Mai","Juin","Juil","Août","Sept","Oct","Nov","Déc"];const items=MN.map((mn,mm)=>{const b=monthBuckets(y,mm);let n=0,o=0;Object.values(b).forEach(w=>{const s=split(w,contract);n+=s.norm;o+=s.over;});return {label:mn,norm:n,over:o};});const norm=items.reduce((a,i)=>a+i.norm,0),over=items.reduce((a,i)=>a+i.over,0);return {items,norm,over,contract};}
function staffPeriod(eid){const e=state.emps.find(x=>x.id===eid);return periodStacked(d=>staffWorkedOnDate(eid,d),e?e.h:35);}
function kidContract(k){if(k.h>0)return k.h;let wh=0;for(let i=0;i<5;i++)segs(k.plan[i]).forEach(s=>wh+=durh(s.s,s.en));return Math.round(wh);}

/* ----- RÉCAP DU JOUR ----- */
function dayRecapCard(c,d){const ks=kidsIn(c).filter(k=>kidSlot(k,d));const cat={"présent":[],"parti":[],"absent":[],"attendu":[]};ks.forEach(k=>{const p=state.pts[k.id+"_"+d]||{status:"attendu"};(cat[p.status]||cat["attendu"]).push({k,p});});
  const sec=(title,key,col,bg)=>{const arr=cat[key];return `<div style="margin-top:10px"><b style="color:${col}">${title} (${arr.length})</b>`+(arr.length?`<div style="margin-top:4px">`+arr.map(o=>`<span class="pill" style="background:${bg};color:${col};margin:2px 4px 2px 0">${o.k.f} ${o.k.l}${o.p.arr?" · "+o.p.arr+(o.p.dep?"→"+o.p.dep:""):""}</span>`).join("")+`</div>`:`<div class="mini">—</div>`)+`</div>`;};
  return `<div class="card"><b>Récap présence — ${DAYS[d]} ${dlabel(state.week,d)} · ${crName(c)}</b>`+sec("Présents","présent","var(--sage-d)","var(--sage-xl)")+sec("Repartis","parti","#6a64a0","var(--lav-l)")+sec("Absents","absent","#9e463c","var(--red-l)")+sec("Pas encore arrivés","attendu","#9a6b22","var(--amber-l)")+`</div>`;}
function printDayRecap(){state.modal=null;document.getElementById("modal").innerHTML="";document.getElementById("app").innerHTML=`<div class="card" style="margin-bottom:8px"><h1>Présence des enfants</h1></div>`+dayRecapCard(state.cid,state.day);setTimeout(function(){window.print();render();},200);}
/* ----- SÉLECTEURS STATS ----- */
function periodHours(k){const d=parseD(state.statDate)||new Date();if(state.statGran==="jour")return childHoursOnDate(k,d);if(state.statGran==="semaine"){const m=mondayOfDate(d);let h=0;for(let i=0;i<5;i++)h+=childHoursOnDate(k,addDays(m,i));return h;}if(state.statGran==="mois")return rangeHours(k,new Date(d.getFullYear(),d.getMonth(),1),new Date(d.getFullYear(),d.getMonth()+1,0));return rangeHours(k,new Date(d.getFullYear(),0,1),new Date(d.getFullYear(),11,31));}
function setStatDate(v){if(v)state.statDate=v;render();}
function setStatMonth(v){if(v){const p=v.split("-").map(Number);state.statDate=isoD(new Date(p[0],p[1]-1,1));}render();}
function setStatYear(v){const d=parseD(state.statDate)||new Date();state.statDate=isoD(new Date(+v,d.getMonth(),1));render();}
function setStatScope(s){state.statScope=s;render();}
function statPicker(){const d=parseD(state.statDate)||new Date(),g=state.statGran;
  if(g==="jour")return `<input type="date" value="${isoD(d)}" onchange="setStatDate(this.value)" style="width:auto">`;
  if(g==="semaine")return `<input type="date" value="${isoD(d)}" onchange="setStatDate(this.value)" style="width:auto"> <span class="mini">jour de la semaine voulue</span>`;
  if(g==="mois")return `<input type="month" value="${d.getFullYear()}-${pad2(d.getMonth()+1)}" onchange="setStatMonth(this.value)" style="width:auto">`;
  const ys=[];for(let y=new Date().getFullYear()+1;y>=2023;y--)ys.push(y);return `<select onchange="setStatYear(this.value)" style="width:auto">`+ys.map(y=>`<option ${y===d.getFullYear()?"selected":""}>${y}</option>`).join("")+`</select>`;}
const crName=id=>{const c=state.creches.find(x=>x.id===id);return c?c.name:"?";};
function isCoupure(k){return (k.spec&&/coup/i.test(k.spec))||k.plan.some(p=>segs(p).length>1);}
function empWeekHours(e){return state.shifts.filter(s=>s.e===e.id).reduce((a,s)=>a+durh(s.s,s.en),0);}
function pmodeBtns(){return `<div class="row" style="gap:4px;background:var(--sage-xl);padding:4px;border-radius:11px">`+[["graph","📊 Graphique"],["grid","▦ Tableau"]].map(x=>`<button class="btn ${state.pmode===x[0]?"pri":""}" style="${state.pmode!==x[0]?"background:transparent;color:var(--sage-d)":""}" onclick="setPmode('${x[0]}')">${x[1]}</button>`).join("")+`</div>`;}
function chips(arr,active,fn){return `<div class="row" style="gap:6px;margin-bottom:14px">`+arr.map(x=>`<button class="btn ${active===x?"pri":"soft"}" onclick="${fn}('${x}')">${x}</button>`).join("")+`</div>`;}
function gantt(rows){const a=toMin(CS),b=toMin(CE),span=b-a,pct=m=>((m-a)/span)*100;const rzA=pct(toMin(RUSH[0])),rzB=pct(toMin(RUSH[1]));
  let ruler="";for(let x=a;x<=b;x+=120)ruler+=`<div style="position:absolute;left:${pct(x)}%;transform:translateX(-50%);font-size:11px;font-weight:bold;color:var(--soft)">${toHM(x).slice(0,2)}h</div>`;
  let body=rows.map(r=>{
    const bars=r.slots.map(s=>{const x=toMin(s.s),y=toMin(s.en);const bg=s.color||r.color;const lbl=s.name?E(s.name):(s.s+"–"+s.en);return `<div title="${s.s}–${s.en}${s.name?" · "+E(s.name):""}" style="position:absolute;left:${pct(x)}%;width:${pct(y)-pct(x)}%;top:5px;height:26px;background:${bg};color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11.5px;font-weight:bold;overflow:hidden;box-shadow:0 4px 10px -7px rgba(0,0,0,.5)"><span>${lbl}</span>${s.del?`<span style="cursor:pointer;opacity:.85" onclick="${s.del}">✕</span>`:""}</div>`;}).join("");
    return `<div style="display:flex;align-items:center;border-bottom:1px solid #f3eee2;min-height:40px"><div style="width:150px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding-right:8px">${r.head}</div><div style="position:relative;flex:1;height:38px"><div style="position:absolute;left:${rzA}%;width:${rzB-rzA}%;top:0;bottom:0;background:var(--terra);opacity:.07"></div>${bars}</div><div style="width:92px;flex-shrink:0;text-align:right">${r.add?`<button class="add noprint" onclick="${r.add}">+ créneau</button>`:""}</div></div>`;
  }).join("");
  return `<div class="scroll"><div style="min-width:760px"><div style="display:flex"><div style="width:150px;flex-shrink:0"></div><div style="position:relative;flex:1;height:20px;border-bottom:1px solid var(--line)"><div style="position:absolute;left:${rzA}%;width:${rzB-rzA}%;top:-2px;bottom:0;background:var(--terra-l);opacity:.5;border-radius:6px"></div>${ruler}<div style="position:absolute;left:${(rzA+rzB)/2}%;transform:translateX(-50%);top:1px;font-size:10px;font-weight:bold;color:var(--terra)">RUSH</div></div><div style="width:92px;flex-shrink:0"></div></div>${body}</div></div>`;}
function openModal(t,x){state.modal=Object.assign({type:t},x||{});render();setTimeout(()=>{const el=document.querySelector('#modal input,#modal select');if(el)el.focus();},50);}
function closeModal(){state.modal=null;render();}
function delShift(id){state.shifts=state.shifts.filter(s=>s.id!==id);persist();render();}
function delMoment(id){state.moments=state.moments.filter(m=>m.id!==id);persist();render();}
function delKid(id){if(confirm("Supprimer cet enfant et son planning ?")){state.kids=state.kids.filter(k=>k.id!==id);persist();render();}}
function delEmp(id){if(confirm("Supprimer ce salarié et ses créneaux ?")){state.emps=state.emps.filter(e=>e.id!==id);state.shifts=state.shifts.filter(s=>s.e!==id);persist();render();}}
function delCreche(id){if(state.creches.length<2){alert("Au moins une crèche est nécessaire.");return;}if(confirm("Supprimer cette crèche ? Ses créneaux et enfants seront retirés.")){state.creches=state.creches.filter(c=>c.id!==id);state.shifts=state.shifts.filter(s=>s.c!==id);state.kids=state.kids.filter(k=>k.c!==id);state.emps.forEach(e=>e.aff=e.aff.filter(a=>a[0]!==id));if(state.cid===id)state.cid=state.creches[0].id;persist();render();}}
function point(id,st){const k=id+"_"+state.day;const cur=state.pts[k]||{status:"attendu",arr:null,dep:null};if(st==="present")cur.status="présent",cur.arr=toHM(state.now);else if(st==="parti"){if(cur.status!=="présent")return;cur.status="parti",cur.dep=toHM(state.now);}else cur.status="absent";state.pts[k]=cur;persist();render();}
function delAbs(id){state.abs=state.abs.filter(a=>a.id!==id);persist();render();}
function delSeg(kid,d,idx){const k=state.kids.find(x=>x.id===kid);const arr=segs(k.plan[d]);arr.splice(idx,1);k.plan[d]=joinSegs(arr);persist();render();}
function reqAction(id,ok){const r=state.requests.find(x=>x.id===id);if(!r)return;if(ok){const k=state.kids.find(x=>x.f+" "+x.l===r.name&&x.c===r.cid);if(k){const f=parseD(r.from||r.date),t=parseD(r.to||r.from||r.date)||f;if(f)for(let d=new Date(f);d<=t;d=addDays(d,1)){const wd=d.getDay()-1;if(wd>=0&&wd<5){const arr=segs(k.plan[wd]);arr.push({s:r.s,en:r.en});k.plan[wd]=joinSegs(arr);}}}r.status="acceptée";}else r.status="refusée";persist();render();}
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function chk(id){const el=document.getElementById(id);return el?el.checked:false;}
function copyTxt(t){navigator.clipboard&&navigator.clipboard.writeText(t).then(()=>toast("Copié ✓"),()=>fb());function fb(){const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("Copié ✓");}catch(e){}ta.remove();}if(!navigator.clipboard)fb();}
function openLink(url){const a=document.createElement("a");a.href=url;a.target="_blank";a.style.display="none";document.body.appendChild(a);a.click();a.remove();}
function mailHref(e){return "mailto:"+encodeURIComponent(e.mail)+"?subject="+encodeURIComponent("Ton planning — semaine du "+dlabel(state.week,0))+"&body="+encodeURIComponent(empWeekText(e));}
function smsHref(e){return "sms:"+e.tel.replace(/[^0-9+]/g,"")+"?&body="+encodeURIComponent(empWeekText(e));}
function sendVia(id,type){const e=state.emps.find(x=>x.id===id);if(!e)return;const lbl=type==="mail"?"e-mail":"SMS";const dest=type==="mail"?e.mail:e.tel;if(!dest){alert("Renseigne d'abord l'"+(type==="mail"?"e-mail":"numéro de téléphone")+" dans la fiche du salarié.");return;}if(confirm("Confirmer l'envoi du planning de "+e.f+" "+e.l+" par "+lbl+" ("+dest+") ?")){openLink(type==="mail"?mailHref(e):smsHref(e));toast("Envoi "+lbl+" ouvert ✓");}}
function printPlanning(mode){state.modal=null;state.view="team";state._pm=state.pmode;state.pmode=mode;state._printAll=(mode==="graph");state._printing=true;render();setTimeout(function(){window.print();state.pmode=state._pm||"graph";state._printAll=false;state._printing=false;render();},250);}
function singleEmpPrint(e){let tot=0;const rows=DAYS.map((d,i)=>{const ss=dayShifts(state.cid,i).filter(s=>s.e===e.id);ss.forEach(s=>tot+=durh(s.s,s.en));return {color:"#6E9079",head:`<div style="min-width:0"><b style="font-size:12.5px">${d}</b><div class="mini">${dlabel(state.week,i)}</div></div>`,slots:ss.map(s=>({s:s.s,en:s.en}))};});
  const txt=DAYS.map((d,i)=>{const ss=dayShifts(state.cid,i).filter(s=>s.e===e.id);return `${d} ${dlabel(state.week,i)} : ${ss.length?ss.map(s=>s.s+"–"+s.en).join("  +  "):"repos"}`;}).join("<br>");
  return `<div class="card"><h1>${e.f} ${e.l}</h1><div class="sub">${creche().name} · ${e.role} · semaine du ${dlabel(state.week,0)} au ${dlabel(state.week,4)}</div><div style="margin-top:14px">${gantt(rows)}</div><div style="margin-top:14px;font-weight:bold;font-size:13px;line-height:1.9">${txt}<br><br>Total : ${tot.toFixed(1)} h</div></div>`+vigilanceCard(state.cid);}
function printOne(id){const e=state.emps.find(x=>x.id===id);if(!e)return;state.modal=null;document.getElementById("modal").innerHTML="";document.getElementById("app").innerHTML=singleEmpPrint(e);setTimeout(function(){window.print();render();},200);}
function toast(m){const d=document.createElement("div");d.textContent=m;d.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--sage-d);color:#fff;padding:10px 18px;border-radius:12px;font-weight:bold;z-index:99";document.body.appendChild(d);setTimeout(()=>d.remove(),1400);}
function empWeekText(e){let lines=[`Planning — ${e.f} ${e.l} (${creche().name})`,`Semaine du ${dlabel(state.week,0)} au ${dlabel(state.week,4)}`,""];let tot=0;DAYS.forEach((dn,i)=>{const ss=dayShifts(state.cid,i).filter(s=>s.e===e.id);ss.forEach(s=>tot+=durh(s.s,s.en));lines.push(`${dn} ${dlabel(state.week,i)} : ${ss.length?ss.map(s=>s.s+"–"+s.en).join("   +   "):"repos"}`);});lines.push("",`Total : ${tot.toFixed(1)} h`);return lines.join("\n");}

function saveModal(){const m=state.modal;
  if(m.type==="creche"){if(m.edit){const c=state.creches.find(x=>x.id===m.edit);c.name=val("m_name")||c.name;c.cap=+val("m_cap")||c.cap;c.open=val("m_open")||c.open;c.close=val("m_close")||c.close;c.color=val("m_color")||c.color;}else{if(!val("m_name"))return;state.creches.push({id:"c"+Date.now(),name:val("m_name"),cap:+val("m_cap")||14,open:val("m_open")||"08:00",close:val("m_close")||"18:30",color:val("m_color")||"#6E9079"});}}
  if(m.type==="emp"){if(m.edit){const e=state.emps.find(x=>x.id===m.edit);e.f=val("m_f")||e.f;e.l=val("m_l")||e.l;e.role=val("m_role");e.h=+val("m_h")||e.h;e.mail=val("m_mail");e.tel=val("m_tel");const c=val("m_c"),t=val("m_t");const ex=e.aff.find(a=>a[0]===c);if(ex)ex[1]=t;else e.aff.push([c,t]);}else{if(!val("m_f")||!val("m_l"))return;const nid="e"+Date.now();state.emps.push({id:nid,f:val("m_f"),l:val("m_l"),role:val("m_role"),h:+val("m_h")||35,mail:val("m_mail"),tel:val("m_tel"),aff:[[val("m_c"),val("m_t")]]});if(!state.users.some(u=>u.id===nid))state.users.push({id:nid,name:val("m_f")+" "+val("m_l"),admin:false,pages:["point","spoint"]});}}
  if(m.type==="child"){const kh=val("m_kh")?+val("m_kh"):null;if(m.edit){const k=state.kids.find(x=>x.id===m.edit);k.f=val("m_f")||k.f;k.l=val("m_l")||k.l;k.g=val("m_g");k.c=val("m_cc")||k.c;k.spec=val("m_spec");k.note=val("m_note");k.dob=val("m_dob");k.arr=val("m_arr");if(kh!=null)k.h=kh;else{let wh=0;for(let i=0;i<5;i++)segs(k.plan[i]).forEach(s=>wh+=durh(s.s,s.en));k.h=Math.round(wh);}}else{if(!val("m_f")||!val("m_l"))return;const s1=(val("m_s")&&val("m_e"))?val("m_s")+"-"+val("m_e"):"09:00-17:00";const s2=(val("m_s2")&&val("m_e2"))?";"+val("m_s2")+"-"+val("m_e2"):"";const slot=s1+s2;const plan=DAYS.map((_,i)=>chk("m_d"+i)?slot:"");let wh=0;plan.forEach(p=>segs(p).forEach(s=>wh+=durh(s.s,s.en)));state.kids.push({id:"k"+Date.now(),f:val("m_f"),l:val("m_l"),c:val("m_cc")||state.cid,g:val("m_g"),spec:val("m_spec"),note:val("m_note"),dob:val("m_dob"),arr:val("m_arr"),h:kh!=null?kh:Math.round(wh),plan});}}
  if(m.type==="shift"){if(!val("m_emp")||!val("m_s")||!val("m_e"))return;state.shifts.push({id:"s"+Date.now(),c:m.c,e:val("m_emp"),day:+m.d,s:val("m_s"),en:val("m_e"),name:val("m_sname").replace(/[|;]/g,""),color:val("m_scolor")});}
  if(m.type==="kseg"){if(!val("m_s")||!val("m_e"))return;const k=state.kids.find(x=>x.id===m.k);const arr=segs(k.plan[m.d]);arr.push({s:val("m_s"),en:val("m_e"),name:val("m_sname").replace(/[|;]/g,""),color:val("m_scolor")});k.plan[m.d]=joinSegs(arr);}
  if(m.type==="abs"){const kind=m.kind||"emp";const ref=val("m_ref");if(!ref)return;let motif=val("m_type");if(kind==="emp"&&motif==="Autre"&&val("m_mototh").trim())motif=val("m_mototh").trim();if(!motif)motif="Absence";const from=val("m_from"),to=val("m_to")||from;if(m.edit){const a=state.abs.find(x=>x.id===m.edit);if(a){a.kind=kind;a.ref=ref;a.motif=motif;a.from=from;a.to=to;}}else state.abs.push({id:"a"+Date.now(),kind,ref,motif,from,to});}
  if(m.type==="moment"){if(!val("m_t")||!val("m_n"))return;if(m.edit){const mo=state.moments.find(x=>x.id===m.edit);if(mo){mo.t=val("m_t");mo.t2=val("m_t2");mo.n=val("m_n");}}else state.moments.push({id:"mo"+Date.now(),t:val("m_t"),t2:val("m_t2"),n:val("m_n")});}
  if(m.type==="user"){if(!val("m_name"))return;state.users.push({id:"u"+Date.now(),name:val("m_name"),admin:val("m_admin")==="1",pages:val("m_admin")==="1"?undefined:["point"]});}
  if(m.type==="rights"){const u=state.users.find(x=>x.id===m.edit);if(u){const PG=["dash","team","kids","point","spoint","stats","combo","req","ann","abs"];const sel=PG.filter(k=>chk("pg_"+k));if(!confirm("Enregistrer les droits d'accès de "+u.name+" ? ("+(sel.length||1)+" page(s))"))return;u.pages=sel.length?sel:["point"];}}
  if(m.type==="addpro"){if(!val("m_emp"))return;const e=state.emps.find(x=>x.id===val("m_emp"));if(e&&!e.aff.some(a=>a[0]===state.cid))e.aff.push([state.cid,val("m_t")||"remplaçant ponctuel"]);}
  if(m.type==="parent"){if(!val("m_name"))return;const from=val("m_from")||monthISO();state.requests.push({id:"r"+Date.now(),name:val("m_name"),cid:state.cid,from:from,to:val("m_to")||from,s:val("m_s")||"09:00",en:val("m_e")||"17:00",motif:val("m_motif"),status:"en attente"});toast("Demande enregistrée ✓");}
  persist();state.modal=null;render();}
function monthISO(){const d=monday(state.week);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

/* render */
function render(){
  const nav=document.getElementById("nav");
  if(typeof location!=="undefined"&&location.hash==="#parent"){document.body.classList.add("auth");if(nav)nav.innerHTML="";document.getElementById("ctrls").innerHTML="";document.getElementById("app").innerHTML=parentFormScreen();document.getElementById("modal").innerHTML="";return;}
  if(!state.session){document.body.classList.add("auth");if(nav)nav.innerHTML="";document.getElementById("ctrls").innerHTML="";document.getElementById("app").innerHTML=loginScreen();document.getElementById("modal").innerHTML="";return;}
  document.body.classList.remove("auth");
  const av=allowedViews();if(!av.includes(state.view))state.view=av[0]||"point";
  if(nav)nav.innerHTML=navHTML();
  document.getElementById("ctrls").innerHTML=ctrls();
  document.getElementById("app").innerHTML='<div class="fade">'+views[state.view]()+'</div>';
  document.getElementById("modal").innerHTML=state.modal?modal():"";
}
function ctrls(){let h=`<select onchange="setCreche(this.value)" style="width:auto">`+state.creches.map(c=>`<option value="${c.id}" ${c.id===state.cid?"selected":""}>${E(c.name)}</option>`).join("")+`</select>`;
  if(["dash","team","kids","combo","point","spoint"].includes(state.view))h+=`<button class="btn soft" onclick="setWeek(-1)">‹</button><span class="mini" style="align-self:center;min-width:118px;text-align:center">Sem. ${dlabel(state.week,0)}→${dlabel(state.week,4)}</span><button class="btn soft" onclick="setWeek(1)">›</button>`;
  h+=`<span class="mini" style="align-self:center">⏱ ${toHM(state.now)}</span>`;
  h+=`<span class="mini" style="align-self:center">${state.session.role==="admin"?"👑":"🧑‍🍼"} ${E(state.session.name)}</span><button class="btn soft" onclick="logout()">Quitter</button>`;
  return h;}
function navHTML(){const pend=state.requests.filter(r=>r.status==="en attente").length;
  const groups=[
    {k:"dash",label:"Tableau de bord",icon:"🏠",items:[["dash","Tableau de bord"]]},
    {k:"plan",label:"Plannings",icon:"🗓",items:[["team","Planning équipe"],["kids","Planning enfants"]]},
    {k:"pt",label:"Pointages",icon:"⏱",items:[["point","Pointage enfants"],["spoint","Pointage salariés"]]},
    {k:"data",label:"Données & graphiques",icon:"📊",items:[["stats","Heures"],["combo","Effectifs & loi"]]},
    {k:"res",label:"Réseau",icon:"🌿",items:[["req","Demandes"+(pend?" ("+pend+")":"")],["ann","Annuaire"],["abs","Absences"]]},
    {k:"set",label:"Réglages",icon:"⚙️",items:[["set","Réglages"]]}
  ];
  const av=allowedViews();
  let out=`<div class="navbrand"><div class="logo">🐦</div><div><div style="font-weight:bold;font-size:18px">Bambino<span style="color:var(--terra)">eco</span></div><div class="mini" style="letter-spacing:.07em">PILOTAGE RÉSEAU</div></div></div>`;
  groups.forEach(g=>{const items=g.items.filter(([k])=>av.includes(k));if(!items.length)return;
    if(items.length===1){const it=items[0];out+=`<div class="navgroup"><div class="navhead ${state.view===it[0]?"act":""}" onclick="setView('${it[0]}')"><span>${g.icon}</span><span>${it[1]}</span></div></div>`;return;}
    const active=items.some(([k])=>k===state.view);const open=state.menuOpen===g.k;

views.ann=function(){

  } else {

    const g=state.annGroup,ca=state.annCarac,cf=state.annCreche;
    const list=state.kids.filter(k=>(cf==="Toutes"||crName(k.c)===cf)&&(g==="Tous"||GLAB[k.g]===g)&&(ca==="Toutes"||(ca==="Coupure"?isCoupure(k):childCaracs(k).some(x=>norm(x)===norm(ca)))));

    if(!list.length)h+=`<div class="mini">Aucun enfant pour ce filtre.</div>`;
  }
  return h;};

views.combo=function(){const c=state.cid,d=state.day,mode=state._mode||"prev",data=counts(c,d,mode);
  const maxK=Math.max(creche().cap,...data.map(s=>s.k)),H=170;
  const maxP=Math.max(2,...data.map(s=>Math.max(s.p,s.req)));
  const rA=toMin(RUSH[0]),rB=toMin(RUSH[1]);
  const under=data.filter(s=>s.k>0&&s.p<s.req);
  const momMarks=s=>state.moments.some(mo=>{const mm=toMin(mo.t);return mm>=s.m&&mm<s.m+30;});
  function axis(){return `<div style="display:flex;margin-top:4px">`+data.map(s=>`<div style="flex:1;text-align:center;font-size:9px;font-weight:bold;color:var(--soft)">${s.m%60===0?toHM(s.m).slice(0,2):""}</div>`).join("")+`</div>`;}
  // graph enfants
  let gA=`<div class="scroll"><div style="min-width:360px"><div style="position:relative;height:${H}px;border-bottom:2px solid var(--line);display:flex;align-items:flex-end;gap:1px"><div style="position:absolute;left:0;right:0;bottom:${creche().cap/maxK*H}px;border-top:2px dashed #cdbfae"><span style="position:absolute;right:0;top:-15px;font-size:10px;font-weight:bold;color:#a9987f">capacité ${creche().cap}</span></div>`+
   data.map(s=>{const rush=s.m>=rA&&s.m<rB;return `<div title="${toHM(s.m)} · ${s.k} enfants (${s.nm} NM / ${s.march} M)" style="flex:1;height:100%;display:flex;flex-direction:column-reverse;background:${rush?"rgba(217,139,111,.07)":"transparent"}"><div style="height:${s.march/maxK*H}px;background:var(--sage);opacity:.85"></div><div style="height:${s.nm/maxK*H}px;background:var(--amber);opacity:.85;border-radius:0"></div></div>`;}).join("")+`</div>${axis()}</div></div>`;
  // graph encadrement
  let gB=`<div class="scroll"><div style="min-width:360px"><div style="position:relative;height:${H}px;border-bottom:2px solid var(--line);display:flex;align-items:flex-end;gap:1px">`+
   data.map(s=>{const rush=s.m>=rA&&s.m<rB;const u=s.k>0&&s.p<s.req;return `<div title="${toHM(s.m)} · ${s.p} pros présents / ${s.req} requis" style="flex:1;position:relative;height:100%;display:flex;align-items:flex-end;background:${rush?"rgba(217,139,111,.07)":"transparent"}"><div style="width:100%;height:${s.req/maxP*H}px;background:${u?"var(--red)":"#cdbfae"};opacity:${u?.9:.5};border-radius:3px 3px 0 0;${u?"background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.45) 3px,rgba(255,255,255,.45) 6px)":""}"></div><div style="position:absolute;bottom:${s.p/maxP*H-2}px;left:0;right:0;height:3px;background:var(--sage-d)"></div></div>`;}).join("")+`</div>${axis()}</div></div>`;
  const ratioTxt=state.ratio==="58"?"1 pro / 5 non-marcheurs + 1 / 8 marcheurs":"1 pro / 6 enfants";
  let h=head("Vue combinée — Enfants × Encadrement",creche().name+" · "+DAYS[d]+" "+dlabel(state.week,d),
    `<div class="row" style="gap:4px;background:var(--sage-xl);padding:4px;border-radius:11px">${[["prev","Prévisionnel"],["reel","Réel"]].map(x=>`<button class="btn ${mode===x[0]?"pri":""}" style="${mode!==x[0]?"background:transparent;color:var(--sage-d)":""}" onclick="state._mode='${x[0]}';render()">${x[1]}</button>`).join("")}</div>`);
  h+=dayTabs();
  h+=`<div class="row" style="gap:14px">`;
  h+=`<div class="card" style="flex:1;min-width:300px"><div class="row" style="justify-content:space-between"><b>Enfants présents</b><span class="mini"><span style="color:var(--amber)">● non-marcheurs</span> <span style="color:var(--sage)">● marcheurs</span></span></div><div style="margin-top:10px">${gA}</div></div>`;
  h+=`<div class="card" style="flex:1;min-width:300px"><div class="row" style="justify-content:space-between"><b>Encadrement vs loi</b><span class="mini"><span style="color:var(--sage-d)">▬ pros présents</span> · <span style="color:#a9987f">▮ min légal</span> · <span style="color:var(--red)">▦ insuffisant</span></span></div><div style="margin-top:10px">${gB}</div></div>`;
  h+=`</div>`;
  h+=`<div class="card" style="margin-top:16px"><div class="row" style="justify-content:space-between;align-items:center"><b>Conformité — loi en vigueur</b><div class="row" style="gap:4px;background:var(--sage-xl);padding:4px;border-radius:11px">${[["6","1 pour 6"],["58","5 / 8"]].map(x=>`<button class="btn ${state.ratio===x[0]?"pri":""}" style="${state.ratio!==x[0]?"background:transparent;color:var(--sage-d)":""}" onclick="setRatio('${x[0]}')">${x[1]}</button>`).join("")}</div></div>`;
  h+=`<p class="mini" style="margin:8px 0">Règle appliquée : ${ratioTxt}, avec au moins 2 pros dès le 4ᵉ enfant présent. Calcul sur les enfants réellement présents par tranche de 30 min.</p>`;
  if(!under.length)h+=`<div style="color:var(--sage-d);font-weight:bold">✓ Encadrement conforme toute la journée.</div>`;
  else h+=`<div style="color:#9e463c;font-weight:bold;margin-bottom:6px">${under.length} tranche(s) en sous-effectif :</div>`+under.map(s=>`<span class="pill" style="background:var(--red-l);color:#9e463c;margin:2px 4px 2px 0">${toHM(s.m)} · ${s.p}/${s.req} pros (${s.k} enf.)</span>`).join("");
  h+=`</div>`;
  return h;};

views.point=function(){const c=state.cid,d=state.day;const ks=kidsIn(c).filter(k=>kidSlot(k,d));
  const get=k=>state.pts[k.id+"_"+d]||{status:"attendu",arr:null,dep:null};
  const present=ks.filter(k=>get(k).status==="présent").length,att=ks.filter(k=>get(k).status==="attendu").length,parti=ks.filter(k=>get(k).status==="parti").length;
  let h=head("Pointage des enfants",creche().name+" · "+DAYS[d]+" "+dlabel(state.week,d)+" · ⏱ "+toHM(state.now),`<button class="btn pri" onclick="printDayRecap()">🖨 Récap présents / absents</button>`);
  h+=dayTabs();
  h+=`<div class="row" style="margin-bottom:16px">${kpi("Présents maintenant",present,"","var(--sage)")}${kpi("Attendus",att,"","var(--amber)")}${kpi("Repartis",parti,"","var(--lav)")}</div>`;
  h+=`<div class="card" style="padding:6px">`+ks.map(k=>{const p=get(k);const col=p.status==="présent"?"var(--sage)":p.status==="parti"?"var(--lav)":p.status==="absent"?"var(--red)":"var(--amber)";
    return `<div style="display:flex;align-items:center;gap:10px;padding:11px;border-bottom:1px solid #f3eee2;flex-wrap:wrap"><span style="width:36px;height:36px;border-radius:11px;background:${GCOL[k.g]}22;color:${GCOL[k.g]};font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ini(k.f,k.l)}</span><div style="flex:1;min-width:110px"><div style="font-weight:bold">${k.f} ${k.l}</div><div class="mini">Prévu ${kidSlot(k,d)} · ${GLAB[k.g]}</div></div><span class="pill" style="background:${col}22;color:${col}">${p.status}${p.arr?" · "+p.arr:""}${p.dep?"→"+p.dep:""}</span><div class="row" style="gap:6px"><button class="btn ${p.status==="attendu"?"pri":"ghost"}" onclick="point('${k.id}','present')">Arrivée</button><button class="btn soft" ${p.status!=="présent"?'style="opacity:.4"':""} onclick="point('${k.id}','parti')">Départ</button><button class="btn soft" style="color:var(--red)" onclick="point('${k.id}','absent')">Absent</button></div></div>`;}).join("")+`</div>`;
  return h;};

views.spoint=function(){const c=state.cid,d=state.day;const isAdmin=state.session&&state.session.role==="admin";
  const selfEmp=(!isAdmin&&state.session&&state.session.userId)?state.emps.find(e=>e.id===state.session.userId):null;
  const eget=e=>state.empPts[e.id+"_"+d]||{status:"à pointer",arr:null,dep:null};
  const ecol=s=>s==="validé"?"var(--sage)":s==="soumis"?"var(--amber)":s==="absent"?"var(--red)":"var(--soft)";
  const list=selfEmp?[selfEmp]:team(c);
  const nb=s=>team(c).filter(e=>eget(e).status===s).length;
  let h=head(selfEmp?"Mon pointage":"Pointage des salariés",(selfEmp?selfEmp.f+" "+selfEmp.l:creche().name)+" · "+DAYS[d]+" "+dlabel(state.week,d)+" · ⏱ "+toHM(state.now),isAdmin?`<button class="btn soft" onclick="validateSel(${d})">✔ Valider la sélection</button><button class="btn pri" onclick="validateAll('${c}',${d})">✔✔ Tout valider</button>`:"");
  h+=dayTabs();
  if(!selfEmp)h+=`<div class="row" style="margin-bottom:16px">${kpi("Pointés",nb("soumis")+nb("validé"),"/ "+team(c).length,"var(--sage)")}${kpi("Validés",nb("validé"),"","var(--sage)")}${kpi("À valider",nb("soumis"),"","var(--amber)")}${kpi("Absentes",nb("absent"),"","var(--red)")}</div>`;
  h+=`<p class="mini" style="margin-bottom:8px">${selfEmp?"Pointe ton arrivée et ton départ pour aujourd'hui.":"Chaque salariée a sa fiche : elle pointe Arrivée / Départ."}${isAdmin?" Les admins vérifient, corrigent et valident — une à une, par sélection, ou tout d'un coup." :""}</p>`;
  h+=`<div class="card" style="padding:6px">`+list.map(e=>{const o=eget(e);const pn=getPunches(o);const sel=state.valSel.includes(e.id);const worked=empWorked(o);const next=pn.length%2===0?"arrivée":"départ";const chips=pn.map((t,i)=>`<span class="pill" style="background:${i%2===0?"var(--sage-xl)":"var(--lav-l)"};color:${i%2===0?"var(--sage-d)":"#6a64a0"}">${i%2===0?"→":"←"} ${t}</span>`).join("");
    return `<div style="display:flex;align-items:center;gap:10px;padding:11px;border-bottom:1px solid #f3eee2;flex-wrap:wrap">`+(isAdmin?`<input type="checkbox" style="width:auto" ${sel?"checked":""} onclick="toggleValSel('${e.id}')">`:"")+`<span style="width:36px;height:36px;border-radius:11px;background:var(--sage-xl);color:var(--sage-d);font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ini(e.f,e.l)}</span><div style="flex:1;min-width:130px"><b>${e.f} ${e.l}</b><div class="mini">${e.role.split(" ")[0]} · contrat ${e.h}h</div>${chips?`<div class="row" style="gap:5px;margin-top:5px;flex-wrap:wrap">${chips}</div>`:""}</div><span class="pill" style="background:${ecol(o.status)}22;color:${ecol(o.status)}">${o.status}${worked?" · "+worked.toFixed(1)+" h":""}</span><div class="row" style="gap:6px">${o.status==="absent"?`<button class="btn soft" onclick="empUndo('${e.id}',${d})">Annuler absence</button>`:`<button class="btn ${next==="arrivée"?"pri":"soft"}" style="${next!=="arrivée"?"color:#b5483b":""}" onclick="empPunch('${e.id}',${d})">${next==="arrivée"?"🟢 Pointer arrivée":"🔴 Pointer départ"}</button>${pn.length?`<button class="iconbtn" title="Annuler le dernier" onclick="empUndo('${e.id}',${d})">↩︎</button>`:""}<button class="btn soft" style="color:var(--red)" onclick="empSetAbs('${e.id}',${d})">Absente</button>`}`+(isAdmin?(o.status==="validé"?`<button class="btn soft" onclick="empUnval('${e.id}',${d})">Dévalider</button>`:`<button class="btn pri" onclick="empValidate('${e.id}',${d})">Valider</button>`):"")+`</div></div>`;}).join("")+`</div><p class="mini" style="margin-top:8px">Un seul bouton : il bascule entre arrivée et départ — pratique pour la pause du midi (arrivée → départ midi → retour → départ soir).</p>`;
  return h;};

views.req=function(){const pend=state.requests.filter(r=>r.status==="en attente");const done=state.requests.filter(r=>r.status!=="en attente");
  let h=head("Demandes des parents","À valider par la gérante",`<button class="btn ghost" onclick="copyParentLink()">🔗 Lien formulaire parent</button><button class="btn pri" onclick="openModal('parent')">+ Saisir une demande</button>`);
  h+=`<div class="card" style="margin-bottom:16px"><b>En attente (${pend.length})</b>`;
  if(!pend.length)h+=`<div class="mini" style="padding:12px 0">Aucune demande en attente.</div>`;
  h+=pend.map(r=>{const cr=state.creches.find(x=>x.id===r.cid);return `<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid #f3eee2;flex-wrap:wrap"><span class="pill" style="background:var(--amber-l);color:#9a6b22">en attente</span><b>${E(r.name)}</b><span class="mini">${cr?cr.name:""} · ${r.from||r.date}${(r.to&&r.to!==(r.from||r.date))?" → "+r.to:""} · ${r.s}–${r.en}${r.motif?" · "+E(r.motif):""}</span><div class="row" style="gap:6px;margin-left:auto"><button class="btn pri" onclick="reqAction('${r.id}',true)">Accepter</button><button class="btn soft" style="color:var(--red)" onclick="reqAction('${r.id}',false)">Refuser</button></div></div>`;}).join("")+`</div>`;
  h+=`<div class="card"><b>Traitées</b>`;if(!done.length)h+=`<div class="mini" style="padding:12px 0">—</div>`;
  h+=done.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid #f3eee2"><span class="pill" style="background:${r.status==="acceptée"?"var(--sage-xl)":"var(--red-l)"};color:${r.status==="acceptée"?"var(--sage-d)":"#9e463c"}">${r.status}</span><b>${E(r.name)}</b><span class="mini">${r.from||r.date}${(r.to&&r.to!==(r.from||r.date))?" → "+r.to:""} · ${r.s}–${r.en}</span></div>`).join("")+`</div>`;
  h+=`<div class="card" style="margin-top:16px"><b>Envoyer le formulaire aux parents</b><p class="mini" style="margin:6px 0 0">Une demande acceptée crée automatiquement la présence de l'enfant dans le planning. Pour collecter les demandes à distance, héberge ce fichier (ou partage-le) : chaque parent ouvre le « Formulaire parent » et envoie sa demande, qui apparaît ici.</p></div>`;
  return h;};

/* ---- ABSENCES ---- */
views.abs=function(){
  const tab=state.absTab;const nameOf=(kind,id)=>{const o=kind==="emp"?state.emps.find(x=>x.id===id):state.kids.find(x=>x.id===id);return o?o.f+" "+o.l:"?";};
  let h=head("Absences & arrêts","Salariés et enfants — motifs, durée, statistiques",`<div class="row" style="gap:4px;background:var(--sage-xl);padding:4px;border-radius:11px">`+[["emp","Salariés"],["child","Enfants"]].map(x=>`<button class="btn ${tab===x[0]?"pri":""}" style="${tab!==x[0]?"background:transparent;color:var(--sage-d)":""}" onclick="setAbsTab('${x[0]}')">${x[1]}</button>`).join("")+`</div><button class="btn pri" onclick="openModal('abs',{kind:'${tab}'})">+ Déclarer</button>`);
  const motifs=tab==="emp"?state.absMotifsEmp:state.absMotifsKid;
  h+=`<div class="card noprint" style="margin-bottom:16px"><div class="row" style="justify-content:space-between;align-items:center"><b>Motifs ${tab==="emp"?"salariés":"enfants"}</b><button class="btn ghost" onclick="addMotif('${tab}')">+ Motif</button></div><div class="row" style="gap:6px;margin-top:8px;flex-wrap:wrap">`+motifs.map(mt=>`<span class="pill" style="background:var(--sage-xl);color:var(--sage-d)">${E(mt)} <span style="cursor:pointer;color:var(--red)" onclick="delMotif('${tab}','${mt.replace(/'/g,"\\'")}')">✕</span></span>`).join("")+`</div>`+(tab==="emp"?`<label style="display:inline-flex;align-items:center;gap:8px;margin-top:12px;text-transform:none;letter-spacing:0;cursor:pointer;font-size:13px"><input type="checkbox" style="width:auto" ${state.showAbsMotif?"checked":""} onclick="toggleAbsMotifShow()"> Afficher le motif sur le planning (sinon « Absente »)</label>`:`<div class="mini" style="margin-top:10px">Pour un enfant, le motif s'écrit librement (les motifs ci-dessus servent de suggestions).</div>`)+`</div>`;
  const used=[...new Set(state.abs.filter(a=>a.kind===tab).map(a=>a.motif))];
  h+=`<div class="row noprint" style="gap:6px;margin-bottom:12px;flex-wrap:wrap">`+["Tous",...used].map(mt=>`<button class="btn ${state.absMotifFilt===mt?"pri":"soft"}" onclick="setAbsMotifFilt('${mt.replace(/'/g,"\\'")}')">${mt}</button>`).join("")+`</div>`;
  const list=state.abs.filter(a=>a.kind===tab&&(state.absMotifFilt==="Tous"||a.motif===state.absMotifFilt)).sort((a,b)=>(b.from||"").localeCompare(a.from||""));
  h+=`<div class="card"><div class="row" style="justify-content:space-between;align-items:center"><b>${list.length} absence(s)</b><button class="btn soft noprint" onclick="printAbs()">🖨 Extraire</button></div>`;
  if(!list.length)h+=`<div class="mini" style="padding:12px 0">Aucune absence pour ce filtre.</div>`;
  h+=list.map(a=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid #f3eee2;flex-wrap:wrap"><b>${nameOf(a.kind,a.ref)}</b><span class="pill" style="background:var(--terra-l);color:var(--terra)">${E(a.motif)}</span><span class="mini">${a.from} → ${a.to||a.from} · ${durDays(a)} j</span><div class="row noprint" style="margin-left:auto;gap:6px"><button class="btn soft" onclick="openModal('abs',{kind:'${a.kind}',edit:'${a.id}'})">Modifier</button><button class="iconbtn" style="color:var(--red)" onclick="delAbs('${a.id}')">🗑</button></div></div>`).join("")+`</div>`;
  const byP={},byM={};list.forEach(a=>{const n=nameOf(a.kind,a.ref);byP[n]=(byP[n]||0)+durDays(a);byM[a.motif]=(byM[a.motif]||0)+durDays(a);});
  h+=`<div class="row" style="margin-top:16px"><div class="card" style="flex:1;min-width:240px"><b>Jours d'absence par ${tab==="emp"?"salarié":"enfant"}</b>`+(Object.keys(byP).length?statBars(Object.entries(byP).map(([k,v])=>({label:k.split(" ")[0],val:v})).sort((a,b)=>b.val-a.val)):`<div class="mini" style="margin-top:8px">—</div>`)+`</div><div class="card" style="flex:1;min-width:240px"><b>Jours par motif</b>`+(Object.keys(byM).length?statBars(Object.entries(byM).map(([k,v])=>({label:k.length>9?k.slice(0,8)+"…":k,val:v})).sort((a,b)=>b.val-a.val)):`<div class="mini" style="margin-top:8px">—</div>`)+`</div></div>`;
  return h;};

/* ---- MODALES ---- */
function fld(l,inner){return `<div><label>${l}</label>${inner}</div>`;}
function colorNameFields(cur){const cols=[["","Défaut","#cfc9bb"],["#6E9079","Vert","#6E9079"],["#B8B2DB","Lavande","#B8B2DB"],["#D98B6F","Terracotta","#D98B6F"],["#E0A458","Ambre","#E0A458"],["#5B8DEF","Bleu","#5B8DEF"],["#C77DA5","Rose","#C77DA5"],["#4E6B59","Vert foncé","#4E6B59"]];cur=cur||"";
  return `<div class="row"><div style="flex:1">${fld("Nom du créneau (optionnel)",`<input id="m_sname" value="${cur&&cur.name?E(cur.name):""}" placeholder="ex. Cuisine, Atelier, Dortoir…">`)}</div></div>`+`<label>Couleur</label><input type="hidden" id="m_scolor" value="${cur&&cur.color?cur.color:""}"><div class="row" id="m_sw" style="gap:8px;flex-wrap:wrap;margin-bottom:6px">`+cols.map(c=>`<button type="button" onclick="pickSw(this,'${c[0]}')" style="width:32px;height:32px;border-radius:9px;border:3px solid ${((cur&&cur.color)||"")===c[0]?'var(--ink)':'transparent'};background:${c[2]};cursor:pointer;box-shadow:0 2px 6px -3px rgba(0,0,0,.4)" title="${c[1]}"></button>`).join("")+`</div>`;}
function pickSw(el,hex){const i=document.getElementById('m_scolor');if(i)i.value=hex;const sib=el.parentNode.children;for(let k=0;k<sib.length;k++)sib[k].style.borderColor='transparent';el.style.borderColor='var(--ink)';}

  }
  let b="",save=`<button class="btn soft" onclick="closeModal()">Annuler</button><button class="btn pri" onclick="saveModal()">${m.type==="parent"?"Envoyer":"Enregistrer"}</button>`;

  if(m.type==="emp")b=`<div class="row"><div style="flex:1">${fld("Prénom",`<input id="m_f" value="${ed?E(eg('f')):""}">`)}</div><div style="flex:1">${fld("Nom",`<input id="m_l" value="${ed?E(eg('l')):""}">`)}</div></div>`+fld("Rôle",`<select id="m_role">`+ROLES.map(r=>`<option ${ed&&eg('role')===r?"selected":""}>${r}</option>`).join("")+`</select>`)+`<div class="row"><div style="flex:1">${fld("E-mail",`<input id="m_mail" type="email" value="${ed?E(eg('mail')):""}" placeholder="prenom@exemple.fr">`)}</div><div style="flex:1">${fld("Téléphone",`<input id="m_tel" value="${ed?E(eg('tel')):""}" placeholder="06 12 34 56 78">`)}</div></div>`+`<div class="row"><div style="flex:1">${fld("Heures/sem",`<input id="m_h" type="number" value="${ed?eg('h'):35}">`)}</div><div style="flex:1">${fld("Crèche",`<select id="m_c">`+state.creches.map(c=>`<option value="${c.id}" ${ed&&eg('aff')[0]&&eg('aff')[0][0]===c.id?"selected":(!ed&&c.id===state.cid?"selected":"")}>${E(c.name)}</option>`).join("")+`</select>`)}</div></div>`+fld("Affectation",`<select id="m_t"><option value="dédié">Dédié</option><option value="remplaçant ponctuel">Remplaçant ponctuel</option></select>`);
  if(m.type==="child"){const ce=m.edit?state.kids.find(x=>x.id===m.edit):null;b=`<div class="row"><div style="flex:1">${fld("Prénom",`<input id="m_f" value="${ce?E(ce.f):""}">`)}</div><div style="flex:1">${fld("Nom",`<input id="m_l" value="${ce?E(ce.l):""}">`)}</div></div>`+`<div class="row"><div style="flex:1">${fld("Date de naissance",`<input id="m_dob" type="date" value="${ce?E(ce.dob):""}">`)}</div><div style="flex:1">${fld("Date d'arrivée",`<input id="m_arr" type="date" value="${ce?E(ce.arr):""}">`)}</div></div>`+fld("Heures contractuelles / semaine (vide = calcul auto)",`<input id="m_kh" type="number" value="${ce&&ce.h?ce.h:""}" placeholder="auto">`)+`<div class="row"><div style="flex:1">${fld("Crèche",`<select id="m_cc">`+state.creches.map(cc=>`<option value="${cc.id}" ${(ce?ce.c===cc.id:cc.id===state.cid)?"selected":""}>${E(cc.name)}</option>`).join("")+`</select>`)}</div><div style="flex:1">${fld("Groupe",`<select id="m_g"><option value="bébé" ${ce&&ce.g==="bébé"?"selected":""}>Bébé (non-marcheur)</option><option value="moyen" ${(!ce||ce.g==="moyen")?"selected":""}>Moyen</option><option value="grand" ${ce&&ce.g==="grand"?"selected":""}>Grand</option></select>`)}</div></div>`+fld("Caractéristiques (séparées par des virgules)",`<input id="m_spec" list="specs" value="${ce?E(ce.spec):""}" placeholder="ex. allergie arachide, PAI, coupure…"><datalist id="specs"><option>coupure</option><option>PAI</option><option>adaptation</option><option>allergie</option><option>allergie arachide</option><option>allergie lactose</option></datalist>`)+fld("Note (optionnel)",`<textarea id="m_note" rows="2" placeholder="Détail utile pour l'équipe (consigne allergie, etc.)">${ce?E(ce.note):""}</textarea>`)+(m.edit?"":`<div class="mini" style="margin-top:4px">Créneau du matin (ou journée entière)</div><div class="row"><div style="flex:1">${fld("Arrivée",`<input id="m_s" value="09:00">`)}</div><div style="flex:1">${fld("Départ",`<input id="m_e" value="17:00">`)}</div></div><div class="mini" style="margin-top:4px;color:var(--terra)">Coupure l'après-midi (optionnel)</div><div class="row"><div style="flex:1">${fld("Retour",`<input id="m_s2" placeholder="14:00">`)}</div><div style="flex:1">${fld("Départ",`<input id="m_e2" placeholder="17:00">`)}</div></div>`+fld("Jours",`<div class="row" style="gap:6px">`+DAYS.map((d,i)=>`<label style="display:flex;align-items:center;gap:5px;background:var(--sage-xl);padding:6px 9px;border-radius:9px;cursor:pointer;text-transform:none;letter-spacing:0;margin:0"><input type="checkbox" id="m_d${i}" style="width:auto">${d.slice(0,3)}</label>`).join("")+`</div>`));}
  if(m.type==="shift"){const e=state.emps.find(x=>x.id===m.e);b=fld("Salarié",`<select id="m_emp">`+team(m.c).map(x=>`<option value="${x.id}" ${m.e===x.id?"selected":""}>${x.f} ${x.l}</option>`).join("")+`</select>`)+`<div class="mini" style="margin-top:4px">${DAYS[m.d]} ${dlabel(state.week,m.d)}</div><div class="row"><div style="flex:1">${fld("Début",`<input id="m_s" value="08:00">`)}</div><div style="flex:1">${fld("Fin",`<input id="m_e" value="16:00">`)}</div></div>`+colorNameFields()+`<div class="mini" style="color:var(--terra)">Pour une coupure, ajoute un 2ᵉ créneau ensuite. Prise de poste : 10h30 max.</div>`;}
  if(m.type==="kseg")b=`<div class="mini">${DAYS[m.d]} ${dlabel(state.week,m.d)}</div><div class="row"><div style="flex:1">${fld("Arrivée",`<input id="m_s" value="09:00">`)}</div><div style="flex:1">${fld("Départ",`<input id="m_e" value="12:00">`)}</div></div>`+colorNameFields()+`<div class="mini" style="color:var(--terra)">Ajoute un 2ᵉ créneau l'après-midi pour une coupure.</div>`;
  if(m.type==="abs"){const kind=m.kind||"emp";const ae=m.edit?state.abs.find(x=>x.id===m.edit):null;
    const who=kind==="emp"?fld("Salarié",`<select id="m_ref">`+state.emps.map(e=>`<option value="${e.id}" ${ae&&ae.ref===e.id?"selected":""}>${e.f} ${e.l}</option>`).join("")+`</select>`):fld("Enfant",`<select id="m_ref">`+state.kids.map(k=>`<option value="${k.id}" ${ae&&ae.ref===k.id?"selected":""}>${k.f} ${k.l} (${crName(k.c)})</option>`).join("")+`</select>`);
    const motifField=kind==="emp"?fld("Motif",`<select id="m_type">`+state.absMotifsEmp.map(mt=>`<option ${ae&&ae.motif===mt?"selected":""}>${mt}</option>`).join("")+((ae&&!state.absMotifsEmp.includes(ae.motif))?`<option selected>${E(ae.motif)}</option>`:"")+`</select>`)+fld("Si « Autre » : motif libre",`<input id="m_mototh" value="${(ae&&!state.absMotifsEmp.includes(ae.motif))?E(ae.motif):""}" placeholder="précise le motif">`):fld("Motif (texte libre)",`<input id="m_type" list="kmotifs" value="${ae?E(ae.motif):""}" placeholder="ex. maladie, vacances…"><datalist id="kmotifs">`+state.absMotifsKid.map(mt=>`<option>${mt}</option>`).join("")+`</datalist>`);
    b=who+motifField+`<div class="row"><div style="flex:1">${fld("Du",`<input id="m_from" type="date" value="${ae?ae.from:isoD(weekDate(state.week,0))}">`)}</div><div style="flex:1">${fld("Au",`<input id="m_to" type="date" value="${ae?(ae.to||ae.from):isoD(weekDate(state.week,4))}">`)}</div></div><div class="mini" style="color:var(--terra)">${kind==="emp"?"La durée s'affichera sur le planning de la salariée.":"Suivi pour les statistiques et extractions."}</div>`;}
  if(m.type==="moment"){const mo=m.edit?state.moments.find(x=>x.id===m.edit):null;b=`<div class="row"><div style="flex:1">${fld("Heure",`<input id="m_t" value="${mo?E(mo.t):"10:30"}">`)}</div><div style="flex:1">${fld("Fin (optionnel)",`<input id="m_t2" value="${mo&&mo.t2?E(mo.t2):""}" placeholder="ex. 11:00">`)}</div></div>`+fld("Nom du moment",`<input id="m_n" value="${mo?E(mo.n):""}" placeholder="Ex. Atelier peinture">`);}
  if(m.type==="addpro"){const others=state.emps.filter(e=>!e.aff.some(a=>a[0]===state.cid));b=fld("Salarié à ajouter au planning de "+creche().name,`<select id="m_emp">`+(others.length?others.map(e=>`<option value="${e.id}">${e.f} ${e.l} (${e.role.split(" ")[0]})</option>`).join(""):`<option value="">Tous les salariés sont déjà ici</option>`)+`</select>`)+fld("Type d'affectation",`<select id="m_t"><option value="dédié">Dédié à cette crèche</option><option value="remplaçant ponctuel">Remplaçant ponctuel</option></select>`)+`<div class="mini" style="margin-top:6px">Il/elle apparaîtra dans le planning de cette crèche. Tu pourras le retirer via la croix sur sa ligne.</div>`;}
  if(m.type==="parent")b=fld("Nom de l'enfant",`<input id="m_name" placeholder="Prénom Nom">`)+`<div class="row"><div style="flex:1">${fld("Du",`<input id="m_from" type="date" value="${monthISO()}">`)}</div><div style="flex:1">${fld("Au (optionnel)",`<input id="m_to" type="date">`)}</div></div><div class="row"><div style="flex:1">${fld("Arrivée",`<input id="m_s" value="09:00">`)}</div><div style="flex:1">${fld("Départ",`<input id="m_e" value="17:00">`)}</div></div>`+fld("Motif (optionnel)",`<input id="m_motif" placeholder="Ex. journée supplémentaire">`);
  if(m.type==="user")b=fld("Nom",`<input id="m_name" placeholder="Prénom Nom">`)+fld("Droits",`<select id="m_admin"><option value="0">🧑‍🍼 Équipe (pointage seul)</option><option value="1">👑 Administrateur (accès complet)</option></select>`);
  if(m.type==="rights"){const u=state.users.find(x=>x.id===m.edit);const PG=[["dash","Tableau de bord"],["team","Planning équipe"],["kids","Planning enfants"],["point","Pointage enfants"],["spoint","Pointage salariés"],["stats","Heures"],["combo","Effectifs & loi"],["req","Demandes"],["ann","Annuaire"],["abs","Absences"]];b=`<p class="mini">Coche les pages auxquelles <b>${u?E(u.name):""}</b> aura accès. (Les Réglages restent réservés aux administrateurs.)</p>`+`<div class="row" style="flex-wrap:wrap;gap:8px">`+PG.map(p=>`<label style="display:flex;align-items:center;gap:6px;background:var(--sage-xl);padding:7px 11px;border-radius:9px;cursor:pointer;text-transform:none;letter-spacing:0;margin:0"><input type="checkbox" id="pg_${p[0]}" style="width:auto" ${u&&(u.pages||["point"]).includes(p[0])?"checked":""}>${p[1]}</label>`).join("")+`</div>`;}
  const T={creche:ed?"Modifier la crèche":"Nouvelle crèche",emp:ed?"Modifier la fiche salarié":"Nouveau salarié",child:ed?"Modifier la fiche enfant":"Nouvel enfant",shift:"Ajouter un créneau",kseg:"Ajouter un créneau enfant",abs:ed?"Modifier l'absence":"Déclarer une absence",moment:ed?"Modifier le moment clé":"Nouveau moment clé",addpro:"Ajouter une pro au planning",parent:"Demande de présence (parent)",user:"Nouvel accès",rights:"Droits d'accès aux pages"}[m.type];
  return wrapModal(T,b,save);
}
function wrapModal(title,body,footer){return `<div class="modalbg" onclick="if(event.target===this)closeModal()"><div class="card fade" style="width:440px;max-width:100%;max-height:90vh;overflow:auto"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px"><h1 style="font-size:21px">${title}</h1><button class="btn soft" onclick="closeModal()">✕</button></div><div style="display:flex;flex-direction:column;gap:11px">${body}</div><div class="row" style="margin-top:18px;justify-content:flex-end">${footer}</div></div></div>`;}

if(typeof document!=="undefined"&&document.addEventListener){(function(){const tip=document.createElement("div");tip.className="charttip";if(document.body)document.body.appendChild(tip);document.addEventListener("mousemove",function(e){const t=e.target&&e.target.closest?e.target.closest("[data-tip]"):null;if(t){tip.textContent=t.getAttribute("data-tip");tip.style.opacity="1";tip.style.left=Math.min(e.clientX+14,(window.innerWidth||800)-220)+"px";tip.style.top=(e.clientY+16)+"px";}else tip.style.opacity="0";});})();}
setInterval(()=>{state.now=realNow();if(!state.modal&&["dash","combo","point","spoint"].includes(state.view))render();},30000);
render();
</script>
</body>
</html>
