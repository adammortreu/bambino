<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bambino Eco — Pilotage des crèches</title>
<style>
  :root{
    --cream:#FBF7EF;--paper:#fff;--sage:#6E9079;--sage-d:#4E6B59;--sage-l:#DDEADE;--sage-xl:#EEF4EE;
    --terra:#D98B6F;--terra-l:#F6E4DC;--lav:#B8B2DB;--lav-l:#E7E4F3;--amber:#E0A458;--amber-l:#FBEFD9;
    --red:#D4756A;--red-l:#F8E1DD;--ink:#3A3A34;--soft:#6C6C62;--line:#E9E3D6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(1000px 500px at 92% -10%,#F4EFE2,transparent 60%),radial-gradient(800px 400px at -8% 110%,#EDF2EC,transparent 55%),var(--cream);
    background-attachment:fixed;min-height:100vh}
  .wrap{max-width:1160px;margin:0 auto;padding:0 16px 60px}
  h1{font-size:27px;line-height:1.1}.sub{color:var(--soft);font-weight:bold;font-size:14px;margin-top:2px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 30px -24px rgba(60,60,52,.4);padding:18px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .btn{font:inherit;font-weight:bold;border:none;cursor:pointer;border-radius:11px;padding:9px 15px;font-size:14px;transition:.12s}
  .btn:active{transform:translateY(1px)}
  .pri{background:var(--sage);color:#fff}.pri:hover{background:var(--sage-d)}
  .soft{background:#fff;border:1px solid var(--line);color:var(--ink)}.soft:hover{border-color:var(--sage)}
  .ghost{background:var(--sage-xl);color:var(--sage-d)}.ghost:hover{background:var(--sage-l)}
  select,input{font:inherit;font-weight:bold;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fff;color:var(--ink);width:100%}
  select:focus,input:focus{outline:none;border-color:var(--sage)}
  label{font-size:11px;font-weight:bold;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
  .pill{border-radius:999px;font-weight:bold;font-size:12px;padding:3px 10px;display:inline-block}
  header{position:sticky;top:0;z-index:30;background:rgba(251,247,239,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:40px;height:40px;border-radius:13px;background:var(--sage);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
  .tab{padding:8px 13px;border-radius:11px;cursor:pointer;font-weight:bold;font-size:14px;color:var(--soft);white-space:nowrap}
  .tab:hover{background:var(--sage-xl);color:var(--sage-d)}
  .tab.on{background:var(--sage);color:#fff}
  .kpi{flex:1;min-width:140px}
  .kpiv{font-size:32px;font-weight:bold;line-height:1.1;margin-top:3px}
  .grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}
  @media(max-width:760px){.grid5{grid-template-columns:repeat(2,1fr)}}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--soft);font-size:12px;padding:8px 6px}
  td{padding:9px 6px;border-top:1px solid #f3eee2}
  .tl{overflow-x:auto}.tlin{min-width:720px}
  .modalbg{position:fixed;inset:0;background:rgba(58,58,52,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:14px}
  .fade{animation:f .3s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .mini{font-size:12px;color:var(--soft);font-weight:bold}
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding-top:12px;padding-bottom:12px">
    <div class="row" style="align-items:center">
      <div class="brand"><div class="logo">🐦</div><div>
        <div style="font-weight:bold;font-size:19px">Bambino<span style="color:var(--terra)">eco</span></div>
        <div class="mini" style="letter-spacing:.08em">PILOTAGE RÉSEAU</div></div></div>
      <div style="margin-left:auto" class="row" id="ctrls"></div>
    </div>
    <div class="row" id="tabs" style="margin-top:10px;gap:5px;overflow-x:auto"></div>
  </div>
</header>
<div class="wrap" id="app" style="padding-top:20px"></div>
<div id="modal"></div>

<script>
/* ===== DONNÉES ===== */
const DAYS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi"];
const ROLES=["Gérante","Auxiliaire de puériculture (AP)","AEP","AP-AEP","Infirmière","EJE","Infirmière / EJE"];
const RUSH=["10:30","16:00"], CS="06:00", CE="20:00";
const GLAB={"bébé":"Bébé","moyen":"Moyen","grand":"Grand"};
const GCOL={"bébé":"#E0A458","moyen":"#6E9079","grand":"#B8B2DB"};

let state={
  view:"dash", cid:"rbx", week:0, day:0, now:13*60+10, modal:null,
  creches:[
    {id:"rbx",name:"Roubaix",cap:12,open:"08:00",close:"18:30",color:"#6E9079"},
    {id:"mcq",name:"Marcq-En-Baroeul",cap:12,open:"08:00",close:"18:00",color:"#C58A6A"},
  ],
  emps:[
    {id:"e0",f:"Audrey",l:"JEROME",role:"Gérante",h:35,aff:[["rbx","dédié"],["mcq","dédié"]]},
    {id:"e1",f:"Clémentine",l:"HAESSLE",role:"Auxiliaire de puériculture (AP)",h:35,aff:[["rbx","dédié"]]},
    {id:"e2",f:"Kadjidja",l:"BENSALEM",role:"AP-AEP",h:35,aff:[["rbx","dédié"]]},
    {id:"e3",f:"Méliana",l:"PONTHIEU",role:"AEP",h:35,aff:[["rbx","dédié"]]},
    {id:"e4",f:"Inès",l:"HIRTI",role:"AEP",h:35,aff:[["rbx","dédié"]]},
    {id:"e5",f:"Amandine",l:"PREVOTS",role:"Infirmière / EJE",h:35,aff:[["mcq","dédié"],["rbx","remplaçant ponctuel"]]},
    {id:"e6",f:"Mélissa",l:"COIMBRA",role:"AEP",h:35,aff:[["mcq","dédié"],["rbx","remplaçant ponctuel"]]},
    {id:"e7",f:"Olivia",l:"DUBAR",role:"AEP",h:35,aff:[["mcq","dédié"],["rbx","remplaçant ponctuel"]]},
    {id:"e8",f:"Pauline",l:"FORMONT",role:"Auxiliaire de puériculture (AP)",h:35,aff:[["mcq","dédié"],["rbx","remplaçant ponctuel"]]},
  ],
  shifts:[], kids:[], pts:{}, abs:[]
};
const SP={rbx:{e4:["07:45","15:00"],e3:["08:30","17:00"],e2:["09:30","18:00"],e1:["10:30","18:45"]},
         mcq:{e6:["08:00","16:00"],e5:["08:30","16:30"],e7:["09:00","17:00"],e8:["10:00","18:00"]}};
(function(){let n=0;for(const c in SP)for(const e in SP[c])for(let d=0;d<5;d++)state.shifts.push({id:"s"+(n++),c,e,day:d,s:SP[c][e][0],en:SP[c][e][1]});})();
const RK=[["Alba","Lebrun","grand",["","08:00-18:30","","08:00-18:30",""]],["Ana","Duprez","moyen",["08:15-17:00","08:15-17:00","","08:15-17:00","08:15-16:30"]],["Assia","Hasseine","bébé",["","","09:00-16:00","","09:00-16:00"]],["Aurèle","Saint-Clair","moyen",["","","08:00-16:00","09:00-17:00","09:00-17:00"]],["Benyamin","Bachir","grand",["08:30-17:15","08:30-17:15","08:30-17:15","",""]],["Hortense","Tordeux","moyen",["09:00-17:30","09:00-17:30","","09:00-17:30","09:00-17:30"]],["Hugo","Lancry","grand",["","08:00-18:00","08:00-18:00","08:00-18:00","08:00-18:00"]],["Insâf","Talbi","moyen",["","08:00-17:00","","08:00-17:00","08:00-17:00"]],["Issa","Kabil","bébé",["09:30-17:00","","09:30-17:00","","09:30-17:00"]],["Jasmine","Haddad","moyen",["","","09:30-17:30","09:30-17:30",""]],["Kamila","Boumediene","bébé",["09:30-17:00","09:30-17:00","","09:30-17:00",""]],["Léo","Touzalin","grand",["09:00-17:30","09:00-17:30","","09:00-17:30","09:00-17:30"]],["Lilo","Vollander","moyen",["08:00-18:30","","08:00-18:30","","08:00-18:30"]],["Naazim","Boukhari","bébé",["08:30-16:00","08:30-16:00","08:30-16:00","08:30-16:00",""]],["Nouri","Rabei","grand",["09:00-17:00","09:00-17:00","09:00-17:00","09:00-17:00",""]],["Pablo","Duthoit","moyen",["09:00-17:00","09:00-17:00","09:00-17:00","09:00-17:00","09:00-17:00"]],["Qayyim","Rabei","grand",["09:00-17:00","09:00-17:00","09:00-17:00","09:00-17:00","09:00-17:00"]],["Tasnim","Tabet","moyen",["10:00-17:00","10:00-17:00","","10:00-17:00","10:00-17:00"]],["Zayn","Boubaker","bébé",["09:30-17:00","09:30-17:00","","09:30-17:00","09:30-17:00"]]];
const MK=[["Marius","Vasseur","moyen",["08:30-16:30","08:30-16:30","08:30-16:30","08:30-16:30","08:30-16:30"]],["Noor","Cherif","bébé",["09:00-17:00","09:00-17:00","","09:00-17:00",""]],["Eliott","Lemaire","grand",["08:00-17:30","08:00-17:30","08:00-17:30","08:00-17:30","08:00-17:30"]],["Sienna","Faure","bébé",["","09:30-16:00","","09:30-16:00",""]],["Gabin","Roussel","grand",["","","08:00-18:00","","08:00-18:00"]],["Lina","Mercier","moyen",["09:00-12:00;14:00-17:00","","09:00-17:00","","09:00-17:00"]]];
(function(){let n=0;RK.forEach(k=>state.kids.push({id:"k"+(n++),f:k[0],l:k[1],c:"rbx",g:k[2],plan:k[3]}));MK.forEach(k=>state.kids.push({id:"k"+(n++),f:k[0],l:k[1],c:"mcq",g:k[2],plan:k[3]}));})();

/* persistance douce */
try{const saved=localStorage.getItem("bambino");if(saved){const o=JSON.parse(saved);Object.assign(state,o);state.modal=null;}}catch(e){}
function persist(){try{const{view,modal,now,...keep}=state;localStorage.setItem("bambino",JSON.stringify(keep));}catch(e){}}

/* ===== UTILS ===== */
const toMin=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;};
const toHM=m=>String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
const durh=(a,b)=>(toMin(b)-toMin(a))/60;
const ini=(f,l)=>(f[0]||"")+(l[0]||"");
const E=s=>(""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function monday(o){const d=new Date(2026,5,15);d.setDate(d.getDate()+o*7);return d;}
function dlabel(o,i){const d=monday(o);d.setDate(d.getDate()+i);return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");}
const creche=()=>state.creches.find(c=>c.id===state.cid);
const team=c=>state.emps.filter(e=>e.aff.some(a=>a[0]===c));
const kidsIn=c=>state.kids.filter(k=>k.c===c);
function dayShifts(c,d){return state.shifts.filter(s=>s.c===c&&s.day===d).filter(s=>!state.abs.some(a=>a.kind==="emp"&&a.ref===s.e&&d>=a.d0&&d<=a.d1));}
function kidSlot(k,d){if(state.abs.some(a=>a.kind==="child"&&a.ref===k.id&&d>=a.d0&&d<=a.d1))return"";return k.plan[d]||"";}
function segs(str){return str?str.split(";").filter(Boolean).map(x=>{const p=x.split("-");return{s:p[0],en:p[1]};}):[];}
function kidSegs(k,d){return segs(kidSlot(k,d));}
function reqPros(n){return n===0?0:Math.max(2,Math.ceil(n/6));}

function counts(c,d,mode){const a=toMin(CS),b=toMin(CE),out=[];const ks=kidsIn(c),sh=dayShifts(c,d);
  for(let m=a;m<b;m+=30){let kc=0;ks.forEach(k=>{if(mode==="reel"){const p=state.pts[k.id+"_"+d];if(p&&p.arr){const x=toMin(p.arr),y=p.dep?toMin(p.dep):state.now;if(x<=m&&m<y)kc++;}}else{if(kidSegs(k,d).some(sg=>toMin(sg.s)<=m&&m<toMin(sg.en)))kc++;}});
  let pc=0;sh.forEach(s=>{if(toMin(s.s)<=m&&m<toMin(s.en))pc++;});out.push({m,k:kc,p:pc});}return out;}
function dayStats(c,d){const cr=state.creches.find(x=>x.id===c);let ch=0;kidsIn(c).forEach(k=>{kidSegs(k,d).forEach(sg=>{ch+=(toMin(sg.en)-toMin(sg.s))/60;});});
  const open=durh(cr.open,cr.close);const occ=open>0?Math.round(100*ch/(cr.cap*open)):0;
  const cnt=counts(c,d,"prev");let peak={k:0,p:0};cnt.forEach(s=>{if(s.k>peak.k)peak=s;});
  const pros=new Set(dayShifts(c,d).map(s=>s.e)).size;return{occ,ch:Math.round(ch),peak:peak.k,pros};}

/* ===== ACTIONS ===== */
function setView(v){state.view=v;render();}
function setCreche(v){state.cid=v;render();}
function setWeek(d){state.week+=d;render();}
function setDay(d){state.day=d;render();}
function openModal(t,extra){state.modal=Object.assign({type:t},extra||{});render();}
function closeModal(){state.modal=null;render();}
function point(id,st){const k=id+"_"+state.day;const cur=state.pts[k]||{status:"attendu",arr:null,dep:null};
  if(st==="present")cur.status="présent",cur.arr=toHM(state.now);
  else if(st==="parti"){if(cur.status!=="présent")return;cur.status="parti",cur.dep=toHM(state.now);}
  else cur.status="absent";state.pts[k]=cur;persist();render();}
function delAbs(id){state.abs=state.abs.filter(a=>a.id!==id);persist();render();}
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function chk(id){const el=document.getElementById(id);return el?el.checked:false;}
function saveModal(){const m=state.modal;
  if(m.type==="creche"){if(!val("m_name"))return;state.creches.push({id:"c"+Date.now(),name:val("m_name"),cap:+val("m_cap")||12,open:val("m_open")||"08:00",close:val("m_close")||"18:30",color:val("m_color")||"#6E9079"});}
  if(m.type==="emp"){if(!val("m_f")||!val("m_l"))return;state.emps.push({id:"e"+Date.now(),f:val("m_f"),l:val("m_l"),role:val("m_role"),h:+val("m_h")||35,aff:[[val("m_c"),val("m_t")]]});}
  if(m.type==="child"){if(!val("m_f")||!val("m_l"))return;const s1=(val("m_s")&&val("m_e"))?val("m_s")+"-"+val("m_e"):"09:00-17:00";const s2=(val("m_s2")&&val("m_e2"))?";"+val("m_s2")+"-"+val("m_e2"):"";const slot=s1+s2;state.kids.push({id:"k"+Date.now(),f:val("m_f"),l:val("m_l"),c:state.cid,g:val("m_g"),plan:DAYS.map((_,i)=>chk("m_d"+i)?slot:"")});}
  if(m.type==="shift"){if(!val("m_emp")||!val("m_s")||!val("m_e"))return;state.shifts.push({id:"s"+Date.now(),c:m.c,e:val("m_emp"),day:m.d,s:val("m_s"),en:val("m_e")});}
  if(m.type==="abs"){if(!val("m_ref"))return;const[kind,ref]=val("m_ref").split(":");state.abs.push({id:"a"+Date.now(),kind,ref,type:val("m_type"),d0:+val("m_d0"),d1:+val("m_d1")});}
  if(m.type==="parent"){alert("✓ Demande envoyée — elle apparaîtrait dans la file de validation de la gérante.");state.modal=null;render();return;}
  persist();state.modal=null;render();}

/* ===== RENDER TÊTE ===== */
function render(){
  document.getElementById("ctrls").innerHTML=ctrls();
  document.getElementById("tabs").innerHTML=tabs();
  document.getElementById("app").innerHTML='<div class="fade">'+views[state.view]()+'</div>';
  document.getElementById("modal").innerHTML=state.modal?modal():"";
}
function ctrls(){
  let h=`<select onchange="setCreche(this.value)" style="width:auto">`+state.creches.map(c=>`<option value="${c.id}" ${c.id===state.cid?"selected":""}>${E(c.name)}</option>`).join("")+`</select>`;
  if(["team","kids","combo","point"].includes(state.view))
    h+=`<button class="btn soft" onclick="setWeek(-1)">‹</button><span class="mini" style="align-self:center;min-width:120px;text-align:center">Sem. ${dlabel(state.week,0)}→${dlabel(state.week,4)}</span><button class="btn soft" onclick="setWeek(1)">›</button>`;
  h+=`<span class="mini" style="align-self:center">⏱ ${toHM(state.now)}</span>`;return h;
}
function tabs(){const T=[["dash","Tableau de bord"],["team","Planning équipe"],["kids","Planning enfants"],["combo","Vue combinée"],["point","Pointage"],["abs","Absences"],["set","Réglages"]];
  return T.map(([k,l])=>`<div class="tab ${state.view===k?"on":""}" onclick="setView('${k}')">${l}</div>`).join("");}
function head(t,s,act){return `<div class="row" style="align-items:flex-end;justify-content:space-between;margin-bottom:16px"><div><h1>${t}</h1>${s?`<div class="sub">${s}</div>`:""}</div>${act||""}</div>`;}
function kpi(l,v,h,col){return `<div class="card kpi"><label>${l}</label><div class="kpiv" style="color:${col}">${v}</div>${h?`<div class="mini">${h}</div>`:""}</div>`;}
function dayTabs(){return `<div class="row" style="margin-bottom:14px;gap:6px">`+DAYS.map((d,i)=>`<button class="btn ${state.day===i?"pri":"soft"}" onclick="setDay(${i})">${d} <span style="opacity:.7">${dlabel(state.week,i)}</span></button>`).join("")+`</div>`;}

/* ===== VUES ===== */
const views={};
views.dash=function(){const c=state.cid,st=DAYS.map((_,d)=>dayStats(c,d));
  const alerts=[];DAYS.forEach((dn,d)=>{counts(c,d,"prev").forEach(s=>{if(s.k>0&&s.p<reqPros(s.k))alerts.push(["red",`${dn} ${toHM(s.m)} : ${s.p} pro(s) pour ${s.k} enfants (min ${reqPros(s.k)})`]);});
    dayShifts(c,d).forEach(s=>{if(toMin(s.s)>toMin("10:30")){const e=state.emps.find(x=>x.id===s.e);alerts.push(["amber",`${dn} : ${e.f} prend son poste à ${s.s} (>10h30)`]);}});
    if(st[d].peak>creche().cap)alerts.push(["red",`${dn} : ${st[d].peak} enfants au pic > capacité (${creche().cap})`]);});
  const dd=[...new Map(alerts.map(a=>[a[1],a])).values()].slice(0,6);
  const presentNow=kidsIn(c).filter(k=>{const p=state.pts[k.id+"_0"];return p&&p.status==="présent";}).length;
  let h=head("Tableau de bord",creche().name+" · vue de la semaine");
  h+=`<div class="row" style="margin-bottom:16px">${kpi("Présents maintenant",presentNow,"d'après le pointage","var(--sage)")}${kpi("Effectif réseau",state.emps.length,"salariés","var(--lav)")}${kpi("Occupation moy.",Math.round(st.reduce((a,s)=>a+s.occ,0)/5)+"%","place-heures","var(--terra)")}${kpi("Capacité",creche().cap,creche().open+"–"+creche().close,"var(--amber)")}</div>`;
  h+=`<div class="card" style="margin-bottom:16px"><b>Occupation & adéquation équipe — par jour</b><div class="grid5" style="margin-top:10px">`+
    st.map((s,d)=>{const ok=s.pros>=reqPros(s.peak),tense=s.pros===reqPros(s.peak);const col=!ok?"var(--red)":tense?"var(--amber)":"var(--sage)";const bg=!ok?"var(--red-l)":tense?"var(--amber-l)":"var(--sage-xl)";
      return `<div onclick="setDay(${d});setView('combo')" style="cursor:pointer;border-radius:14px;padding:12px;background:${bg}"><div style="font-weight:bold;font-size:13px">${DAYS[d]}</div><div class="mini">${dlabel(state.week,d)}</div><div style="font-size:28px;font-weight:bold;color:${col};margin:4px 0">${s.occ}%</div><div style="height:6px;background:#fff;border-radius:6px;overflow:hidden"><div style="width:${Math.min(100,s.occ)}%;height:100%;background:${col}"></div></div><div class="mini" style="margin-top:6px">👶 ${s.peak} pic · 🧑‍🍼 ${s.pros}</div></div>`;}).join("")+`</div></div>`;
  h+=`<div class="card"><b>Alertes</b>`;
  if(!dd.length)h+=`<div style="padding:12px 0;color:var(--sage-d);font-weight:bold">✓ Aucune alerte cette semaine.</div>`;
  h+=dd.map(a=>`<div style="display:flex;gap:10px;align-items:center;padding:9px 11px;border-radius:11px;background:${a[0]==="red"?"var(--red-l)":"var(--amber-l)"};margin-top:8px"><span>${a[0]==="red"?"⛔":"⚠️"}</span><span style="font-weight:bold;font-size:13.5px">${a[1]}</span></div>`).join("")+`</div>`;
  return h;};

function timeline(rows,note){const a=toMin(CS),b=toMin(CE),span=b-a,pct=m=>((m-a)/span)*100;const rA=pct(toMin(RUSH[0])),rB=pct(toMin(RUSH[1]));
  let hrs="";for(let x=a;x<=b;x+=60)hrs+=`<div style="position:absolute;left:${pct(x)}%;transform:translateX(-50%);font-size:11px;font-weight:bold;color:var(--soft)">${toHM(x).slice(0,2)}</div>`;
  let body=rows.map(r=>{const slots=r.slots.map(s=>{const x=toMin(s.s),y=toMin(s.en);return `<div title="${s.s}–${s.en}" style="position:absolute;left:${pct(x)}%;width:${pct(y)-pct(x)}%;top:7px;height:30px;background:${r.color};color:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;overflow:hidden;box-shadow:0 4px 10px -7px rgba(0,0,0,.4)">${s.s}–${s.en}</div>`;}).join("");
    return `<div style="display:flex;align-items:center;border-bottom:1px solid #f3eee2;min-height:44px"><div style="width:148px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding-right:8px"><span style="width:26px;height:26px;border-radius:8px;background:${r.color}22;color:${r.color};font-weight:bold;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${r.badge}</span><div style="min-width:0"><div style="font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.label}</div><div class="mini">${r.sub}</div></div></div><div style="position:relative;flex:1;height:44px"><div style="position:absolute;left:${rA}%;width:${rB-rA}%;top:0;bottom:0;background:var(--terra);opacity:.07"></div>${slots}</div></div>`;}).join("");
  return `<div class="tl"><div class="tlin"><div style="display:flex"><div style="width:148px;flex-shrink:0"></div><div style="position:relative;flex:1;height:22px;border-bottom:1px solid var(--line)"><div style="position:absolute;left:${rA}%;width:${rB-rA}%;top:-2px;bottom:0;background:var(--terra-l);opacity:.5;border-radius:6px"></div>${hrs}<div style="position:absolute;left:${(rA+rB)/2}%;transform:translateX(-50%);top:2px;font-size:10px;font-weight:bold;color:var(--terra)">RUSH</div></div></div>${body}</div></div>${note?`<p class="mini" style="margin-top:10px">${note}</p>`:""}`;}

views.team=function(){const c=state.cid,d=state.day,sh=dayShifts(c,d);
  const rows=team(c).map(e=>{const mine=sh.filter(s=>s.e===e.id);const aff=e.aff.find(a=>a[0]===c);
    return {label:e.f+" "+e.l,sub:(e.role.split(" ")[0])+" · "+(aff?aff[1]:""),color:aff&&aff[1].includes("rempl")?"#B8B2DB":"#6E9079",badge:ini(e.f,e.l),slots:mine.map(s=>({s:s.s,en:s.en}))};}).filter(r=>r.slots.length);
  const tot=sh.reduce((a,s)=>a+durh(s.s,s.en),0);
  let h=head("Planning équipe",creche().name+" · timeline 06h–20h",`<button class="btn pri" onclick="openModal('shift',{c:'${c}',d:${d}})">+ Créneau</button>`);
  h+=dayTabs();
  h+=`<div class="card" style="margin-bottom:16px"><div class="row mini" style="margin-bottom:8px"><span>👥 ${new Set(sh.map(s=>s.e)).size} pros</span><span>⏱ ${tot.toFixed(1)} h</span><span style="color:var(--terra)">● rush 10h30–16h</span></div>${rows.length?timeline(rows,"Pour une coupure (poste en deux fois), ajoute simplement deux créneaux le même jour. Dernière prise de poste : 10h30 max."):'<div class="mini" style="padding:16px 0">Aucun créneau ce jour.</div>'}</div>`;
  // tableau heures
  h+=`<div class="card"><b>Heures de la semaine & heures supp.</b><div class="tl" style="margin-top:8px"><table style="min-width:560px"><thead><tr><th>Salarié</th>${DAYS.map(d=>`<th style="text-align:center">${d.slice(0,3)}</th>`).join("")}<th style="text-align:center">Total</th><th style="text-align:center">Contrat</th><th style="text-align:center">Supp.</th></tr></thead><tbody>`+
    team(c).map(e=>{let t=0;const pd=DAYS.map((_,d)=>{const x=dayShifts(c,d).filter(s=>s.e===e.id).reduce((a,s)=>a+durh(s.s,s.en),0);t+=x;return x;});const sup=t-e.h;
      return `<tr><td style="font-weight:bold">${e.f} ${e.l}</td>${pd.map(x=>`<td style="text-align:center;color:${x?"var(--ink)":"#cfc8b8"}">${x?x.toFixed(1):"–"}</td>`).join("")}<td style="text-align:center;font-weight:bold">${t.toFixed(1)}</td><td style="text-align:center;color:var(--soft)">${e.h}</td><td style="text-align:center"><span class="pill" style="background:${sup>0?"var(--amber-l)":"var(--sage-xl)"};color:${sup>0?"#9a6b22":"var(--sage-d)"}">${sup>0?"+":""}${sup.toFixed(1)}h</span></td></tr>`;}).join("")+
    `</tbody></table></div></div>`;
  return h;};

views.kids=function(){const c=state.cid,d=state.day;const ks=kidsIn(c).filter(k=>kidSlot(k,d));
  const rows=ks.map(k=>{return{label:k.f+" "+k.l,sub:GLAB[k.g]+(kidSegs(k,d).length>1?" · coupure":""),color:GCOL[k.g],badge:ini(k.f,k.l),slots:kidSegs(k,d)};});

  return h;};

views.combo=function(){const c=state.cid,d=state.day;const mode=state._mode||"prev";const data=counts(c,d,mode);
  const maxK=Math.max(creche().cap,...data.map(s=>s.k));const H=180,rA=toMin(RUSH[0]),rB=toMin(RUSH[1]);
  const under=data.filter(s=>s.k>0&&s.p<reqPros(s.k)).length;
  let bars=data.map(s=>{const rush=s.m>=rA&&s.m<rB;const u=s.k>0&&s.p<reqPros(s.k);
    return `<div title="${toHM(s.m)} · ${s.k} enfants / ${s.p} pros" style="flex:1;position:relative;height:100%;display:flex;align-items:flex-end;background:${rush?"rgba(217,139,111,.07)":"transparent"}"><div style="width:100%;height:${(s.k/maxK)*H}px;background:${u?"var(--red)":"var(--sage)"};border-radius:4px 4px 0 0;opacity:.88;${u?"background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.45) 3px,rgba(255,255,255,.45) 6px)":""}"></div><div style="position:absolute;bottom:${(s.p/maxK)*H-2}px;left:0;right:0;height:3px;background:var(--terra)"></div></div>`;}).join("");
  let ax=data.map(s=>`<div style="flex:1;text-align:center;font-size:9px;font-weight:bold;color:var(--soft)">${s.m%60===0?toHM(s.m).slice(0,2):""}</div>`).join("");
  const choreo=[["10:30","Dernière prise de poste · 1 pro en cuisine"],["11:00","Repas bébés"],["11:30","Repas moyens/grands"],["12:15","Répartition à 3 : sol / change / cuisine"],["13:00","1ʳᵉ sieste bébés · 1ʳᵉ pause"],["13:15","Sieste moyens-grands · 1 pro/dortoir"],["13:45","Pause +45 min · premiers réveils"],["15:30","Goûter"],["16:30","Nettoyage · premiers départs"]];
  let h=head("Vue combinée — Enfants × Équipe",creche().name+" · "+DAYS[d]+" "+dlabel(state.week,d),
    `<div class="row" style="gap:4px;background:var(--sage-xl);padding:4px;border-radius:11px">${[["prev","Prévisionnel"],["reel","Réel (pointage)"]].map(x=>`<button class="btn ${mode===x[0]?"pri":""}" style="${mode!==x[0]?"background:transparent;color:var(--sage-d)":""}" onclick="state._mode='${x[0]}';render()">${x[1]}</button>`).join("")}</div>`);
  h+=dayTabs();
  h+=`<div class="card"><div class="row mini" style="margin-bottom:12px"><span><span style="display:inline-block;width:12px;height:12px;background:var(--sage);border-radius:3px;vertical-align:middle"></span> Enfants</span><span><span style="display:inline-block;width:12px;height:3px;background:var(--terra);vertical-align:middle"></span> Pros</span><span style="color:var(--red)">▦ encadrement insuffisant</span></div>`;
  h+=`<div class="tl"><div class="tlin"><div style="position:relative;height:${H}px;border-bottom:2px solid var(--line);display:flex;align-items:flex-end;gap:2px"><div style="position:absolute;left:0;right:0;bottom:${(creche().cap/maxK)*H}px;border-top:2px dashed #cdbfae"><span style="position:absolute;right:0;top:-15px;font-size:10px;font-weight:bold;color:#a9987f">capacité ${creche().cap}</span></div>${bars}</div><div style="display:flex;margin-top:4px">${ax}</div></div></div></div>`;
  h+=`<div class="row" style="margin-top:16px"><div class="card" style="flex:1;min-width:240px"><b>Lecture du jour</b><div style="font-weight:bold;color:var(--soft);line-height:2;margin-top:6px">Pic enfants : <b style="color:var(--ink)">${Math.max(...data.map(s=>s.k))}</b><br>Pros au pic : <b style="color:var(--ink)">${Math.max(...data.map(s=>s.p))}</b><br>Tranches en sous-effectif : <b style="color:${under?"var(--red)":"var(--sage-d)"}">${under}</b></div></div>`;
  h+=`<div class="card" style="flex:1;min-width:240px"><b>Chorégraphie de l'après-midi</b><div style="margin-top:8px">`+choreo.map((s,i)=>{const rush=toMin(s[0])>=rA&&toMin(s[0])<rB;return `<div style="display:flex;gap:10px;padding-bottom:${i<choreo.length-1?10:0}px"><div style="display:flex;flex-direction:column;align-items:center"><div style="width:10px;height:10px;border-radius:50%;background:${rush?"var(--terra)":"var(--sage)"};flex-shrink:0"></div>${i<choreo.length-1?'<div style="width:2px;flex:1;background:var(--line)"></div>':""}</div><div style="margin-top:-3px"><span style="font-weight:bold;font-size:13px;color:${rush?"var(--terra)":"var(--sage-d)"}">${s[0]}</span> <span class="mini">${s[1]}</span></div></div>`;}).join("")+`</div></div></div>`;
  return h;};

views.point=function(){const c=state.cid,d=state.day;const ks=kidsIn(c).filter(k=>kidSlot(k,d));
  const get=k=>state.pts[k.id+"_"+d]||{status:"attendu",arr:null,dep:null};
  const present=ks.filter(k=>get(k).status==="présent").length,att=ks.filter(k=>get(k).status==="attendu").length,parti=ks.filter(k=>get(k).status==="parti").length;
  let h=head("Pointage des enfants",creche().name+" · "+DAYS[d]+" "+dlabel(state.week,d)+" · ⏱ "+toHM(state.now));
  h+=`<div class="row" style="margin-bottom:16px">${kpi("Présents maintenant",present,"","var(--sage)")}${kpi("Attendus",att,"","var(--amber)")}${kpi("Repartis",parti,"","var(--lav)")}</div>`;
  h+=`<div class="card" style="padding:6px">`+ks.map(k=>{const p=get(k);const col=p.status==="présent"?"var(--sage)":p.status==="parti"?"var(--lav)":p.status==="absent"?"var(--red)":"var(--amber)";
    return `<div style="display:flex;align-items:center;gap:10px;padding:11px;border-bottom:1px solid #f3eee2;flex-wrap:wrap"><span style="width:36px;height:36px;border-radius:11px;background:${GCOL[k.g]}22;color:${GCOL[k.g]};font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ini(k.f,k.l)}</span><div style="flex:1;min-width:110px"><div style="font-weight:bold">${k.f} ${k.l}</div><div class="mini">Prévu ${kidSlot(k,d)} · ${GLAB[k.g]}</div></div><span class="pill" style="background:${col}22;color:${col}">${p.status}${p.arr?" · "+p.arr:""}${p.dep?"→"+p.dep:""}</span><div class="row" style="gap:6px"><button class="btn ${p.status==="attendu"?"pri":"ghost"}" onclick="point('${k.id}','present')">Arrivée</button><button class="btn soft" ${p.status!=="présent"?'style="opacity:.4"':""} onclick="point('${k.id}','parti')">Départ</button><button class="btn soft" style="color:var(--red)" onclick="point('${k.id}','absent')">Absent</button></div></div>`;}).join("")+`</div>`;
  h+=`<p class="mini" style="margin-top:10px">Chaque pointage horodate l'heure réelle et alimente le « Réel » de la vue combinée.</p>`;
  return h;};

views.abs=function(){const c=state.cid;const rempl=state.emps.filter(e=>e.aff.some(a=>a[0]===c&&a[1].includes("rempl")));

function fld(l,inner){return `<div><label>${l}</label>${inner}</div>`;}
function modal(){const m=state.modal;const T={creche:"Nouvelle crèche",emp:"Nouveau salarié",child:"Nouvel enfant",shift:"Ajouter un créneau",abs:"Déclarer une absence",parent:"Demande de présence (parent)"}[m.type];

  if(m.type==="child")b=`<div class="row"><div style="flex:1">${fld("Prénom",`<input id="m_f">`)}</div><div style="flex:1">${fld("Nom",`<input id="m_l">`)}</div></div>`+fld("Groupe",`<select id="m_g"><option value="bébé">Bébé</option><option value="moyen" selected>Moyen</option><option value="grand">Grand</option></select>`)+`<div class="mini" style="margin-top:4px">Créneau du matin (ou journée entière)</div><div class="row"><div style="flex:1">${fld("Arrivée",`<input id="m_s" value="09:00">`)}</div><div style="flex:1">${fld("Départ",`<input id="m_e" value="17:00">`)}</div></div><div class="mini" style="margin-top:4px;color:var(--terra)">Coupure l'après-midi (optionnel — laisse vide si journée continue)</div><div class="row"><div style="flex:1">${fld("Retour",`<input id="m_s2" placeholder="14:00">`)}</div><div style="flex:1">${fld("Départ",`<input id="m_e2" placeholder="17:00">`)}</div></div>`+fld("Jours",`<div class="row" style="gap:6px">`+DAYS.map((d,i)=>`<label style="display:flex;align-items:center;gap:5px;background:var(--sage-xl);padding:6px 9px;border-radius:9px;cursor:pointer;text-transform:none;letter-spacing:0;margin:0"><input type="checkbox" id="m_d${i}" style="width:auto">${d.slice(0,3)}</label>`).join("")+`</div>`);
  if(m.type==="shift")b=fld("Salarié",`<select id="m_emp"><option value="">— choisir —</option>`+team(m.c).map(e=>`<option value="${e.id}">${e.f} ${e.l}</option>`).join("")+`</select>`)+`<div class="row"><div style="flex:1">${fld("Début",`<input id="m_s" value="08:00">`)}</div><div style="flex:1">${fld("Fin",`<input id="m_e" value="16:00">`)}</div></div><div class="mini" style="color:var(--terra)">⚠ Dernière prise de poste conseillée : 10h30 max.</div>`;
  if(m.type==="abs")b=fld("Concerne",`<select id="m_ref"><option value="">— choisir —</option><optgroup label="Salariés">`+state.emps.map(e=>`<option value="emp:${e.id}">${e.f} ${e.l}</option>`).join("")+`</optgroup><optgroup label="Enfants">`+kidsIn(state.cid).map(k=>`<option value="child:${k.id}">${k.f} ${k.l}</option>`).join("")+`</optgroup></select>`)+fld("Motif",`<select id="m_type"><option>Arrêt maladie</option><option>Congé</option><option>Absence</option><option>Férié</option></select>`)+`<div class="row"><div style="flex:1">${fld("Du",`<select id="m_d0">`+DAYS.map((d,i)=>`<option value="${i}">${d}</option>`).join("")+`</select>`)}</div><div style="flex:1">${fld("Au",`<select id="m_d1">`+DAYS.map((d,i)=>`<option value="${i}" ${i===4?"selected":""}>${d}</option>`).join("")+`</select>`)}</div></div>`;
  if(m.type==="parent")b=fld("Enfant",`<select id="m_ref">`+kidsIn(state.cid).map(k=>`<option>${k.f} ${k.l}</option>`).join("")+`</select>`)+fld("Date",`<input type="date">`)+`<div class="row"><div style="flex:1">${fld("Arrivée",`<input value="09:00">`)}</div><div style="flex:1">${fld("Départ",`<input value="17:00">`)}</div></div>`+fld("Motif (optionnel)",`<input placeholder="Ex. journée supplémentaire">`);
  return `<div class="modalbg" onclick="if(event.target===this)closeModal()"><div class="card fade" style="width:430px;max-width:100%;max-height:90vh;overflow:auto"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px"><h1 style="font-size:21px">${T}</h1><button class="btn soft" onclick="closeModal()">✕</button></div><div style="display:flex;flex-direction:column;gap:11px">${b}</div><div class="row" style="margin-top:18px"><button class="btn soft" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn pri" style="flex:2" onclick="saveModal()">${m.type==="parent"?"Envoyer":"Enregistrer"}</button></div></div></div>`;
}
render();
</script>
</body>
</html>
